<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>젤라또 매니저</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════
   Design Tokens — Toss-inspired Light Theme
════════════════════════════════════════════════════════ */
:root {
  --bg:        #F8FAFC;
  --surface:   #FFFFFF;
  --panel:     #FFFFFF;
  --border:    #E2E8F0;
  --border-2:  #CBD5E1;
  --text:      #0F172A;
  --muted:     #64748B;
  --accent:    #3B82F6;
  --accent-bg: #EFF6FF;
  --accent-2:  #2563EB;
  --green:     #10B981;
  --green-bg:  #ECFDF5;
  --red:       #EF4444;
  --red-bg:    #FEF2F2;
  --yellow:    #F59E0B;
  --orange:    #F97316;
  --purple:    #8B5CF6;
  --inp:       #F1F5F9;
  --sh-xs:     0 1px 2px rgba(0,0,0,.05);
  --sh-sm:     0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --sh-md:     0 4px 16px rgba(0,0,0,.08);
  --r:         10px;
  --r-sm:      7px;
}

/* ════ Reset ════════════════════════════════════════════ */
*  { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'PretendardVariable', 'Pretendard', -apple-system, BlinkMacSystemFont,
               'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.01em;
}

/* ════ Navigation ═══════════════════════════════════════ */
.nav {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 48px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--sh-xs);
}
.nav-btn {
  background: none; border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 16px 20px;
  font-size: 15px; font-weight: 500;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .15s;
}
.nav-btn:hover  { color: var(--text); }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* ════ Layout ═══════════════════════════════════════════ */
.tab        { display: none; padding: 32px 48px; max-width: 1600px; margin: 0 auto; }
.tab.active { display: block; }

/* ════ Card ═════════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--sh-xs);
}
.card-title {
  font-size: 12px; font-weight: 700;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 16px;
}

/* ════ Segmented Control ════════════════════════════════ */
.seg-ctrl { display:flex; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:3px; }
.seg-btn  { background:none; border:none; padding:6px 20px; border-radius:6px; font-size:14px; font-weight:500; color:var(--muted); cursor:pointer; transition:all .2s; }
.seg-btn.active { background:var(--surface); color:var(--accent); font-weight:600; box-shadow:0 1px 3px rgba(0,0,0,.1); }

/* ════ Flavor Filter Dropdown ═══════════════════════════ */
.filter-wrap { position:relative; }
.filter-btn  { display:flex; align-items:center; gap:5px; background:var(--surface); border:1px solid var(--border-2); border-radius:var(--r-sm); padding:6px 12px; font-size:14px; font-weight:500; color:var(--text); cursor:pointer; transition:all .15s; white-space:nowrap; }
.filter-btn:hover { border-color:var(--accent); color:var(--accent); }
.filter-panel { position:absolute; top:calc(100% + 6px); right:0; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--sh-md); min-width:180px; z-index:200; overflow:hidden; }
.filter-panel-hdr { padding:10px 14px 8px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.filter-all-btn { font-size:11px; color:var(--accent); background:none; border:none; cursor:pointer; font-weight:600; }
.filter-item { display:flex; align-items:center; gap:8px; padding:9px 14px; cursor:pointer; transition:background .1s; font-size:14px; }
.filter-item:hover { background:var(--bg); }

/* ════ Production Steps ═════════════════════════════════ */
.step-label {
  font-size: 12px; font-weight: 700;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 12px;
}
.step-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px 24px;
  margin-bottom: 12px;
  box-shadow: var(--sh-xs);
}
.option-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 10px; margin-bottom: 4px;
}
.option-card {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px 16px;
  cursor: pointer; transition: all .15s;
  text-align: center; font-size: 14px;
}
.option-card:hover   { border-color: var(--accent); background: var(--accent-bg); }
.option-card.selected { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
.option-dot  { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
.option-name { font-weight: 600; }

.recipe-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
.recipe-item {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px 18px;
  cursor: pointer; display: flex;
  justify-content: space-between; align-items: center;
  transition: all .15s;
}
.recipe-item:hover    { border-color: var(--accent); background: var(--accent-bg); }
.recipe-item.selected { border-color: var(--accent); background: var(--accent-bg); }
.recipe-meta { font-size: 13px; color: var(--muted); margin-top: 3px; }

.ingredient-preview { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.ing-tag {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 5px; padding: 4px 10px;
  font-size: 12px; color: var(--muted); font-weight: 500;
}
.batch-row  { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
.batch-input {
  background: var(--inp); border: 1.5px solid var(--border);
  color: var(--text); border-radius: var(--r-sm);
  padding: 10px 14px; font-size: 22px; font-weight: 700;
  width: 100px; text-align: center; transition: border-color .15s;
}
.batch-input:focus { outline: none; border-color: var(--accent); background: #fff; }
.cost-preview    { font-size: 13px; color: var(--muted); margin-top: 8px; }
.cost-highlight  { color: var(--green); font-weight: 700; }

/* ════ Buttons ══════════════════════════════════════════ */
.btn {
  border: none; border-radius: var(--r-sm);
  padding: 9px 18px; cursor: pointer;
  font-size: 14px; font-weight: 600;
  transition: all .15s; letter-spacing: -.01em;
  white-space: nowrap;
}
.btn-primary          { background: var(--accent); color: #fff; }
.btn-primary:hover    { background: var(--accent-2); }
.btn-primary:disabled { opacity: .4; cursor: default; }
.btn-ghost            { background: transparent; border: 1px solid var(--border-2); color: var(--muted); }
.btn-ghost:hover      { border-color: var(--text); color: var(--text); background: var(--bg); }
.btn-danger           { background: var(--red); color: #fff; }
.btn-danger:hover     { opacity: .88; }
.btn-sm               { padding: 5px 12px; font-size: 13px; border-radius: 6px; }

/* ════ Recipe Management ════════════════════════════════ */
.mgmt-layout { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }
@media (max-width: 900px) { .mgmt-layout { grid-template-columns: 1fr; } }
.option-sidebar { display: flex; flex-direction: column; gap: 4px; }
.sidebar-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 11px 14px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; font-weight: 500; transition: all .15s;
}
.sidebar-item:hover    { border-color: var(--accent); background: var(--accent-bg); }
.sidebar-item.selected { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
.sidebar-add {
  text-align: center; color: var(--muted);
  border: 1.5px dashed var(--border-2);
  border-radius: var(--r-sm); padding: 11px; cursor: pointer;
  font-size: 14px; font-weight: 500; transition: all .15s; margin-top: 4px;
}
.sidebar-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

.recipe-editor { display: flex; flex-direction: column; gap: 12px; }
.recipe-row {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 20px 24px; box-shadow: var(--sh-xs);
}
.recipe-header      { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.recipe-name-input  {
  background: transparent; border: none;
  border-bottom: 1.5px solid var(--border);
  color: var(--text); padding: 4px 2px 4px 0;
  font-size: 15px; font-weight: 700; width: 240px; transition: border-color .15s;
}
.recipe-name-input:focus { outline: none; border-bottom-color: var(--accent); }
.yield-input { background: var(--inp); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; width: 90px; }

/* ── 이력 인라인 편집 (클릭 시 편집) ──────────────── */
.ph-inp {
  background: transparent; border: 1px solid transparent;
  color: var(--text); border-radius: 5px;
  padding: 4px 6px; font-size: 14px; text-align: center;
  transition: all .15s; font-family: inherit; cursor: default;
}
.ph-inp:hover  { border-color: var(--border); background: var(--inp); cursor: text; }
.ph-inp:focus  { outline: none; border-color: var(--accent); background: #fff; cursor: text; }
.ph-sep        { color: var(--border-2); font-size: 11px; user-select: none; }
#prodHistory   { overflow-x: auto; }
#prodHistory table td  { padding: 11px 14px; }
#prodHistory table th  { padding: 10px 14px; }
#prodHistory select.ph-inp { text-align: left; cursor: pointer; }

.ing-row   { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.ing-select { background: var(--inp); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 8px; min-width: 150px; font-size: 14px; }
.ing-qty    { background: var(--inp); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 8px; width: 80px; }
.recipe-cost { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 13px; color: var(--muted); }

/* ════ Table ════════════════════════════════════════════ */
table { width: 100%; border-collapse: collapse; }
th {
  background: var(--bg); color: var(--muted);
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  padding: 11px 16px; text-align: left; border-bottom: 1px solid var(--border);
}
td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 14px; }
tr:last-child td { border-bottom: none; }
tr:hover td      { background: var(--bg); }
.cell-input { background: transparent; border: none; color: var(--text); width: 100%; font-size: 14px; padding: 2px 0; }
.cell-input:focus { outline: 1.5px solid var(--accent); border-radius: 4px; background: var(--accent-bg); padding: 2px 6px; }

/* ════ Misc ═════════════════════════════════════════════ */
.row-btns { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.toast {
  position: fixed; bottom: 32px; right: 32px;
  background: var(--text); color: #fff;
  padding: 12px 20px; border-radius: var(--r-sm);
  z-index: 9999; opacity: 0;
  transform: translateY(8px);
  transition: opacity .2s, transform .2s;
  font-size: 14px; font-weight: 500;
  box-shadow: var(--sh-md); pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.empty      { color: var(--muted); text-align: center; padding: 48px; font-size: 14px; }
.section-hdr    { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.section-hdr h3 { font-size: 15px; font-weight: 700; }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
.url-link       { color: var(--accent); text-decoration: none; font-size: 12px; font-weight: 500; }
.url-link:hover { text-decoration: underline; }
select, input   { font-family: inherit; }

/* ════ Modal ════════════════════════════════════════════ */
.modal-overlay      { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.22); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
.modal-overlay.show { display: flex; }
.modal-box          { background: var(--surface); border-radius: 16px; padding: 28px; min-width: 300px; box-shadow: 0 20px 60px rgba(0,0,0,.14); }
.modal-box h4       { margin-bottom: 16px; font-size: 16px; font-weight: 700; }
.modal-select       { width: 100%; background: var(--inp); border: 1.5px solid var(--border); color: var(--text); border-radius: var(--r-sm); padding: 10px 12px; font-size: 14px; margin-bottom: 16px; }
.modal-btns         { display: flex; gap: 8px; justify-content: flex-end; }

/* ════ Research Recipe System ══════════════════════════════ */
.base-recipe-section  { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 20px 24px; box-shadow: var(--sh-xs); margin-bottom: 16px; }
.base-recipe-header   { display: flex; align-items: center; gap: 10px; padding-bottom: 14px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.base-badge   { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; letter-spacing: .6px; padding: 3px 8px; border-radius: 4px; flex-shrink:0; }
.archive-badge{ background: var(--border); color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: .6px; padding: 3px 8px; border-radius: 4px; }
.research-section-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.research-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 20px 24px; box-shadow: var(--sh-xs); margin-bottom: 12px; }
.research-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.research-card-title  { font-size: 15px; font-weight: 700; color: var(--text); }
.status-badge   { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; flex-shrink:0; }
.status-ongoing { background: #EFF6FF; color: #1d4ed8; }
.status-success { background: #F0FDF4; color: #166534; }
.status-fail    { background: #FFF1F2; color: #9f1239; }
.status-adopted { background: #F5F3FF; color: #6d28d9; }
.delta-table    { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0 10px; }
.delta-table th { color: var(--muted); font-weight: 600; font-size: 11px; text-align: left; padding: 4px 12px 6px 0; border-bottom: 1px solid var(--border); }
.delta-table td { padding: 5px 12px 5px 0; border-bottom: 1px solid var(--border); }
.delta-table tr:last-child td { border-bottom: none; }
.delta-pos { color: #16a34a; font-weight: 600; }
.delta-neg { color: #dc2626; font-weight: 600; }
.delta-neu { color: var(--muted); }
.source-chip      { display: inline-flex; align-items: center; gap: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 12px; color: var(--accent); text-decoration: none; margin-right: 6px; margin-bottom: 4px; }
.source-chip:hover{ background: var(--accent-bg); }
.hyp-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .6px; text-transform: uppercase; margin-bottom: 4px; }
.hyp-text  { font-size: 13px; color: var(--text); line-height: 1.55; }
.archive-list { margin-top: 4px; }
.archive-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--muted); }
.archive-item:last-child { border-bottom: none; }
/* Research Modal */
.research-modal-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 800px) { .research-modal-grid { grid-template-columns: 1fr; } }
.modal-section-title  { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .6px; text-transform: uppercase; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.modal-field       { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
.modal-inp     { width: 100%; background: var(--inp); border: 1.5px solid var(--border); color: var(--text); border-radius: var(--r-sm); padding: 8px 12px; font-size: 14px; font-family: inherit; box-sizing: border-box; transition: border-color .15s; }
.modal-inp:focus { outline: none; border-color: var(--accent); }
.modal-textarea  { resize: vertical; min-height: 78px; line-height: 1.5; }
.src-row      { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
.src-type-sel { background: var(--inp); border: 1.5px solid var(--border); color: var(--text); border-radius: var(--r-sm); padding: 6px 8px; font-size: 12px; font-family: inherit; flex-shrink: 0; }
.delta-inp-tbl    { width: 100%; border-collapse: collapse; font-size: 13px; }
.delta-inp-tbl th { font-size: 11px; font-weight: 700; color: var(--muted); text-align: right; padding: 4px 0 8px; border-bottom: 1px solid var(--border); }
.delta-inp-tbl th:first-child { text-align: left; }
.delta-inp-tbl td { padding: 5px 0; border-bottom: 1px solid var(--border); vertical-align: middle; text-align: right; }
.delta-inp-tbl td:first-child { text-align: left; }
.delta-inp-tbl tr:last-child td { border-bottom: none; }
.di       { width: 72px; background: var(--inp); border: 1.5px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; font-size: 13px; font-family: inherit; text-align: right; transition: all .15s; }
.di:focus { outline: none; border-color: var(--accent); }
.di.pos   { border-color: #16a34a; background: #f0fdf4; color: #16a34a; }
.di.neg   { border-color: #dc2626; background: #fff1f2; color: #dc2626; }
.res-qty     { font-weight: 700; }
.res-qty.pos { color: #16a34a; }
.res-qty.neg { color: #dc2626; }
.research-cost-bar { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 14px; font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>

<!-- ── 네비 ──────────────────────────────────────── -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('prod')">생산 관리</button>
  <button class="nav-btn" onclick="switchTab('recipe')">레시피 관리</button>
  <button class="nav-btn" onclick="switchTab('ingr')">재료 관리</button>
</nav>

<!-- ══════════════════════════════════════════════
     탭 1: 생산 관리
════════════════════════════════════════════════ -->
<div id="tab-prod" class="tab active">

  <!-- 주별/월별 생산량 추이 차트 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="card-title" style="margin-bottom:0">주별 생산량 추이</div>
      <div style="display:flex;align-items:center;gap:10px">
        <!-- 맛 필터 드롭다운 -->
        <div class="filter-wrap" id="flavorFilterWrap">
          <button class="filter-btn" onclick="toggleFlavorDropdown(event)">
            <span id="flavorFilterLabel">전체 맛</span>
            <span style="font-size:10px;opacity:.6">▾</span>
          </button>
          <div class="filter-panel" id="flavorFilterPanel" style="display:none">
            <div class="filter-panel-hdr">
              <span style="font-size:12px;font-weight:600;color:var(--muted)">맛 필터</span>
              <button class="filter-all-btn" onclick="selectAllFlavors(event)">전체 선택</button>
            </div>
            <div id="flavorCheckboxList"></div>
          </div>
        </div>
        <!-- 주간/월간 세그먼트 -->
        <div class="seg-ctrl">
          <button class="seg-btn active" data-period="week" onclick="setProdTrendPeriod('week')">주간</button>
          <button class="seg-btn" data-period="month" onclick="setProdTrendPeriod('month')">월간</button>
        </div>
      </div>
    </div>
    <canvas id="chartProdTrend" height="160"></canvas>
  </div>

  <!-- 생산 이력 -->
  <div class="card">
    <div class="section-hdr">
      <h3>생산 이력</h3>

// KST 유틸 ─────────────────────────────────────────────────
// 항상 KST(+09:00) 기준으로 처리
const pad2 = n => String(n).padStart(2, '0');

function kstNow() {
  // UTC ms → KST ms → 각 필드 추출 (getUTC* 사용)
  const d = new Date(Date.now() + 9 * 3600 * 1000);
  return { y: d.getUTCFullYear(), m: d.getUTCMonth() + 1, d: d.getUTCDate(), h: d.getUTCHours() };
}

// 저장할 시각 문자열: YYYY-MM-DDTHH:00:00+09:00
function buildKstStr(y, m, d, h) {
  return `${y}-${pad2(m)}-${pad2(d)}T${pad2(h)}:00:00+09:00`;
}

// 이력 표시용
// 새 형식 "YYYY-MM-DD HH:mm" → 이미 KST, 변환 없이 표시
// 구 형식 UTC ISO → +9h 변환
function fmtKST(timeStr) {
  if (!timeStr) return '';
  const s = String(timeStr);
  if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}/.test(s)) {
    return s.slice(0, 10) + ' ' + s.slice(11, 13) + '시';
  }
  const ms = Date.parse(s);
  if (isNaN(ms)) return s.slice(0, 13).replace('T', ' ') + '시';
  const d = new Date(ms + 9 * 3600 * 1000);
  return `${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}-${pad2(d.getUTCDate())} ${d.getUTCHours()}시`;
}

// 수정 UI용: KST 필드 추출
function parseKST(timeStr) {
  if (!timeStr) return kstNow();
  const s = String(timeStr);
  if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}/.test(s)) {
    return { y: +s.slice(0,4), m: +s.slice(5,7), d: +s.slice(8,10), h: +s.slice(11,13) };
  }
  const ms = Date.parse(s);
  if (isNaN(ms)) return kstNow();
  const d = new Date(ms + 9 * 3600 * 1000);
  return { y: d.getUTCFullYear(), m: d.getUTCMonth()+1, d: d.getUTCDate(), h: d.getUTCHours() };
}

function setProdTimeInputs(kst) {
  document.getElementById('ptY').value = kst.y;
  document.getElementById('ptM').value = kst.m;
  document.getElementById('ptD').value = kst.d;
  document.getElementById('ptH').value = kst.h;
}

function getProdTimeStr() {
  const y = parseInt(document.getElementById('ptY').value);
  const m = parseInt(document.getElementById('ptM').value);
  const d = parseInt(document.getElementById('ptD').value);
  const h = parseInt(document.getElementById('ptH').value) || 0;
  return buildKstStr(y, m, d, h);
}

const WASTE_FACTOR = 1.1; // 재료 손실 10%

function recipeCost(recipe) {
  const raw = recipe.ingredients.reduce((sum, ri) => {
    const ing = getIngr(ri.id);
    return sum + (ing ? ing.price * ri.qty : 0);
  }, 0);
  return raw * WASTE_FACTOR;
}

function batchVolume(recipe) {
  return recipe.ingredients.reduce((sum, ri) => {
    const ing = getIngr(ri.id);
    return sum + (ing && ing.unit === 'g' ? ri.qty : 0);
  }, 0);
}

// ═══════════════════════════════════════════════════════════
// 생산량 추이 차트
// ═══════════════════════════════════════════════════════════
function parseDateOnly(timeStr) {
  const s = String(timeStr || '');
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return new Date(s.slice(0, 10));
  const ms = Date.parse(s);
  if (!isNaN(ms)) {
    const d = new Date(ms + 9 * 3600 * 1000);
    return new Date(`${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}-${pad2(d.getUTCDate())}`);
  }
  return null;
}

function getPeriodLabel(timeStr) {
  const d = parseDateOnly(timeStr);
  if (!d) return null;
  if (prodTrendPeriod === 'month') {
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
  }
  const weekNum = Math.ceil(d.getDate() / 7);
  return `${d.getMonth()+1}월${weekNum}주`;
}

// 시트 저장 이름(구 이름 '바나나' 포함)으로 옵션/색상 찾기
function findOptBySheetName(flavorName) {
  let opt = META.options.find(o => o.name === flavorName);
  if (opt) return opt;
  const recipe = META.recipes.find(rc =>
    rc.name === flavorName || rc.name.startsWith(flavorName + ' ') || flavorName.startsWith(rc.name.split(' ')[0])
  );
  return recipe ? META.options.find(o => o.id === recipe.optionId) : null;
}

// 저장된 레코드에서 현재 META 레시피 해결
// 전략: ① ID 직접 조회(신규) → ② 레시피명 정확/부분 일치(구버전) → ③ 옵션ID/명 역추적(구구버전)
function resolveRecipeFromRecord(r) {
  const recipeVal = String(r['레시피'] || '');
  const optVal    = String(r['옵션'] || r['맛'] || r['메뉴'] || '');

  // 0. ID 직접 조회 (신규 레코드 — 가장 우선)
  if (recipeVal) {
    const byId = META.recipes.find(rc => rc.id === recipeVal);
    if (byId) return byId;
  }
  if (optVal) {
    const optById = META.options.find(o => o.id === optVal);
    if (optById) {
      const m = META.recipes.find(rc => rc.optionId === optById.id);
      if (m) return m;
    }
  }

  // 1. 레시피명 정확 일치 (구버전 이름 저장 호환)
  if (recipeVal) {
    const m = META.recipes.find(rc => rc.name === recipeVal);
    if (m) return m;
  }

  // 2. 레시피명 부분 일치 (이름 변경 대응)
  if (recipeVal) {
    const m = META.recipes.find(rc =>
      rc.name.startsWith(recipeVal) || recipeVal.startsWith(rc.name)
    );
    if (m) return m;
  }

  // 3. 옵션명으로 레시피 찾기 (정확 일치)
  if (optVal) {
    const opt = META.options.find(o => o.name === optVal);
    if (opt) {
      const m = META.recipes.find(rc => rc.optionId === opt.id);
      if (m) return m;
    }
  }

  // 4. 옵션명 부분 일치 (이름 변경 대응)
  if (optVal) {
    const opt = META.options.find(o =>
      o.name.startsWith(optVal) || optVal.startsWith(o.name)
    );
    if (opt) {
      const m = META.recipes.find(rc => rc.optionId === opt.id);
      if (m) return m;
    }
  }

  return null;
}

// 레코드에서 현재 META 기준 정규 옵션명 반환 (이름 변경 후에도 일관성 유지)
function getFlavorFromRecord(r) {
  const recipe = resolveRecipeFromRecord(r);
  if (recipe) {
    const opt = META.options.find(o => o.id === recipe.optionId);
    return opt ? opt.name : recipe.name;
  }
  // META에 없는 경우: 저장된 이름 그대로 사용
  return String(r['옵션'] || r['맛'] || r['메뉴'] || '');
}

function renderFlavorFilter() {
  const container = document.getElementById('flavorCheckboxList');
  if (!container) return;
  const allFlavors = [...new Set(prodRawData.map(r => getFlavorFromRecord(r)).filter(Boolean))];
  if (!prodTrendFlavorFilter) prodTrendFlavorFilter = new Set(allFlavors);
  container.innerHTML = allFlavors.map(f => {
    const opt = findOptBySheetName(f);
    const color = opt ? opt.color : '#5794f2';
    const checked = prodTrendFlavorFilter.has(f);
    return `<div class="filter-item" onclick="toggleFlavorFilter('${f}',${!checked})">
      <input type="checkbox" ${checked ? 'checked' : ''} style="accent-color:${color};pointer-events:none">
      <span>${f}</span>
    </div>`;
  }).join('');
  updateFlavorFilterLabel(allFlavors);
}

function updateFlavorFilterLabel(allFlavors) {
  const el = document.getElementById('flavorFilterLabel');
  if (!el) return;
  const n = allFlavors.filter(f => prodTrendFlavorFilter && prodTrendFlavorFilter.has(f)).length;
  el.textContent = n === 0 ? '없음' : n === allFlavors.length ? '전체 맛' : `${n}개 선택`;
}

  document.getElementById('addProdModal').classList.remove('show');
  selOptionId = null; selRecipeId = null;
}

function renderProdTrendChart() {
  const periodMap = {};

  prodRawData.forEach(r => {
    const d = parseDateOnly(String(r['생산시각']||''));
    if (!d) return;
    const optName = getFlavorFromRecord(r);
    if (!optName) return;
    const label = getPeriodLabel(String(r['생산시각']||''));
    if (!label) return;

    const recipe = resolveRecipeFromRecord(r);
    const vol    = recipe ? batchVolume(recipe) * (parseInt(r['배치수'])||1) : 0;

    if (!periodMap[label]) periodMap[label] = {};
    periodMap[label][optName] = (periodMap[label][optName] || 0) + vol;
  });

  const periods = Object.keys(periodMap).sort((a, b) => {
    if (prodTrendPeriod === 'week') {
      const pa = a.match(/(\d+)월(\d+)주/), pb = b.match(/(\d+)월(\d+)주/);
      if (pa && pb) return (parseInt(pa[1])*10+parseInt(pa[2])) - (parseInt(pb[1])*10+parseInt(pb[2]));
    }
    return a.localeCompare(b);
  });

  const allFlavors = [...new Set(prodRawData.map(r => getFlavorFromRecord(r)).filter(Boolean))];
  const flavors    = allFlavors.filter(f => prodTrendFlavorFilter && prodTrendFlavorFilter.has(f));

  const datasets = flavors.map(f => {
    const opt = findOptBySheetName(f);
    return {
      label: f,
      data: periods.map(p => (periodMap[p]&&periodMap[p][f]) || 0),
      backgroundColor: opt ? opt.color : '#5794f2',
      borderWidth: 0,
      stack: 'stack'
    };
  });

  if (chartProdTrend) chartProdTrend.destroy();
  const canvas = document.getElementById('chartProdTrend');
  if (!canvas) return;

  chartProdTrend = new Chart(canvas, {
    type: 'bar',
    data: { labels: periods, datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color:'#0F172A', font:{ size:12, family:"'PretendardVariable','Pretendard',sans-serif" } } },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}g` } }
      },
      scales: {
        x: { stacked:true, ticks:{ color:'#64748B', font:{ size:12 } }, grid:{ color:'#E2E8F0' } },
        y: { stacked:true, ticks:{ color:'#64748B', font:{ size:12 }, callback: v => v>=1000?(v/1000).toFixed(1)+'kg':v+'g' }, grid:{ color:'#E2E8F0' } }
      }
    }
  });
}

function renderProdOptions() {

}

function selectProdOption(id) {
  selOptionId = id;
  selRecipeId = null;
  renderProdOptions();
}

function renderProdStep2() {
  const step2 = document.getElementById('prodStep2');
  const step3 = document.getElementById('prodStep3');
  if (!selOptionId) { step2.style.display = 'none'; step3.style.display = 'none'; return; }

  // archived base 제외, 재료 없는 레시피 제외, base 먼저 → research 순서
  const recipes = META.recipes
    .filter(r => r.optionId === selOptionId && !r.version && r.ingredients?.length > 0)
    .sort((a, b) => (a.type === 'base' ? 0 : 1) - (b.type === 'base' ? 0 : 1));
  if (!recipes.length) { step2.style.display = 'none'; step3.style.display = 'none'; return; }

  step2.style.display = 'block';
  const list = document.getElementById('prodRecipeList');
  list.innerHTML = '';
  recipes.forEach(recipe => {
    const cost      = recipeCost(recipe);
    const vol       = batchVolume(recipe);
    const per120    = vol ? Math.round(cost / vol * 120) : 0;
    const isRes     = recipe.type === 'research';
    const label     = (recipe.hypothesis?.title) || recipe.name;
    const div       = document.createElement('div');
    div.className   = 'recipe-item' + (recipe.id === selRecipeId ? ' selected' : '');
    div.innerHTML   = `
      <div>
        <div style="display:flex;align-items:center;gap:8px">
          ${isRes ? '<span style="font-size:10px;background:#EFF6FF;color:#1d4ed8;padding:2px 6px;border-radius:4px;font-weight:700">연구</span>' : ''}
          <span>${label}</span>
        </div>
        <div class="recipe-meta">배치 ${vol.toLocaleString()}g &nbsp;·&nbsp; 원가 ${fmt(cost)} &nbsp;·&nbsp; 120g당 ${per120}원</div>
      </div>
      <span style="color:var(--muted);font-size:18px">›</span>`;
    div.onclick = () => selectProdRecipe(recipe.id);
    list.appendChild(div);
  });
  renderProdStep3();
}

function selectProdRecipe(id) {
  selRecipeId = id;
  renderProdStep2();
}

function renderProdStep3() {
  const step3 = document.getElementById('prodStep3');
  if (!selRecipeId) { step3.style.display = 'none'; return; }
  step3.style.display = 'block';

  const recipe = getRecipe(selRecipeId);
  if (!recipe) return;

  document.getElementById('prodIngPreview').innerHTML =
    recipe.ingredients.map(ri => {
      const ing = getIngr(ri.id);
      return `<span class="ing-tag">${ing ? ing.name : ri.id} ${ri.qty}${ing ? ing.unit : ''}</span>`;
    }).join('');

  // 생산 일시 기본값: 최초 표시 시에만 현재 KST 시각으로 설정
  if (!document.getElementById('ptY').value) {
    setProdTimeInputs(kstNow());
  }

  updateCostPreview();
  document.getElementById('prodBatchInput').oninput = updateCostPreview;
}

function updateCostPreview() {
  const recipe = getRecipe(selRecipeId);
  if (!recipe) return;
  const batches = parseInt(document.getElementById('prodBatchInput').value) || 1;
  const total   = recipeCost(recipe) * batches;
  const totalG  = batchVolume(recipe) * batches;
  document.getElementById('prodCostPreview').innerHTML =
    `총 생산량 <span class="cost-highlight">${totalG.toLocaleString()}g</span> &nbsp;·&nbsp; 예상 원가 <span class="cost-highlight">${fmt(total)}</span>`;
}

async function submitProduction() {
  const recipe  = getRecipe(selRecipeId);
  const opt     = getOpt(selOptionId);
  const batches = parseInt(document.getElementById('prodBatchInput').value) || 1;
  if (!recipe || !opt) return;

  const btn = document.getElementById('prodSubmitBtn');
  btn.disabled = true;
  btn.textContent = '저장 중…';

  const timeISO = getProdTimeStr();

  const params = new URLSearchParams({
    action: 'addProduction',
    time:    timeISO,
    option:  opt.id,
    recipe:  recipe.id,
    batches
  });

  try {
    await fetch(API + '?' + params.toString());
    showToast(`등록 완료: ${opt.name} - ${recipe.name} × ${batches}배치`);
    closeAddProdModal();
    loadProdHistory();
  } catch(e) {
    showToast('저장 실패. 다시 시도해주세요.');

  btn.disabled = false;
  btn.textContent = '생산 등록';
}

async function loadProdHistory() {
  const el = document.getElementById('prodHistory');
  try {
    const res  = await fetch(API + '?action=getProduction');
    const json = await res.json();
    prodRawData = json.data || [];
    renderFlavorFilter();

      <table>
        <thead><tr>
          <th>생산시각</th>
          <th>맛</th>
          <th>레시피</th>
          <th style="text-align:center">배치</th>

function onPhOptChange(sel, row) {
  const recSel = document.getElementById('phRec-' + row);
  if (recSel) recSel.innerHTML = _phRecipeOpts(sel.value, '');
  scheduleProdSave(row);

function scheduleProdSave(row) {
  clearTimeout(_phTimers[row]);
  _phTimers[row] = setTimeout(() => saveProdRow(row), 600);
}

async function saveProdRow(row) {
  const tr  = document.querySelector(`tr[data-row="${row}"]`);
  if (!tr) return;
  const get = f => tr.querySelector(`[data-field="${f}"]`)?.value;
  const y = parseInt(get('y')), m = parseInt(get('m')), d = parseInt(get('d')), h = parseInt(get('h')) || 0;
  if (!y || !m || !d) return;
  try {
    await fetch(API + '?' + new URLSearchParams({
      action:  'updateProduction',
      row,
      time:    buildKstStr(y, m, d, h),
      option:  get('option')  || '',
      recipe:  get('recipe')  || '',
      batches: get('batches') || 1

async function deleteProdRow(row) {
  if (!confirm('이 생산 기록을 삭제하시겠습니까?')) return;

    loadProdHistory();
  } catch(e) {
    showToast('삭제 실패');

// 탭 3: 레시피 관리
// ═══════════════════════════════════════════════════════════

// ── 마이그레이션: 기존 레시피에 type:'base' 추가 ──────────
function migrateRecipeTypes() {
  let changed = false;
  META.recipes.forEach(r => {
    if (!r.type) { r.type = 'base'; changed = true; }
    if (r.type === 'base' && r.version === undefined) { r.version = null; changed = true; }
  });
  if (changed) persistMeta();
}

// ── 데이터 헬퍼 ───────────────────────────────────────────
function getBaseRecipe(optionId) {
  return META.recipes.find(r => r.optionId === optionId && r.type === 'base' && !r.version) || null;
}
function getArchivedBases(optionId) {
  return META.recipes
    .filter(r => r.optionId === optionId && r.type === 'base' && r.version)
    .sort((a, b) => b.version - a.version);
}
function getResearchRecipes(optionId) {
  return META.recipes.filter(r => r.optionId === optionId && r.type === 'research');
}

// ── 델타 계산 (changed ingredients only) ─────────────────
function computeDeltas(resRecipe, baseRecipe) {
  if (!baseRecipe) return [];
  const allIds = new Set([
    ...baseRecipe.ingredients.map(ri => ri.id),
    ...resRecipe.ingredients.map(ri => ri.id)
  ]);
  const result = [];
  for (const ingId of allIds) {
    const ing     = getIngr(ingId);
    const baseQty = baseRecipe.ingredients.find(ri => ri.id === ingId)?.qty || 0;
    const resQty  = resRecipe.ingredients.find(ri => ri.id === ingId)?.qty  || 0;
    const delta   = resQty - baseQty;
    if (Math.abs(delta) > 0.001) {
      result.push({ ingId, name: ing?.name || ingId, unit: ing?.unit || '', baseQty, resQty, delta });
    }
  }
  return result;
}

// ── 승격 ─────────────────────────────────────────────────
let _promotingId = null;
function openPromoteModal(researchId) {
  const r    = getRecipe(researchId);
  if (!r) return;
  const base = getBaseRecipe(r.optionId);
  const arcs = getArchivedBases(r.optionId);
  const nextV = arcs.length ? Math.max(...arcs.map(a => a.version)) + 1 : 1;
  const title = r.hypothesis?.title || r.name;
  const baseName = base ? base.name.replace(/_v\d+$/, '') : '';
  document.getElementById('promoteMsg').innerHTML =
    `<strong>"${title}"</strong>을 기본 레시피로 승격합니다.<br><br>` +
    (base ? `현재 기본 레시피 <strong>"${baseName}"</strong>는 <strong>"${baseName}_v${nextV}"</strong>으로 보관됩니다.` : '');
  _promotingId = researchId;
  document.getElementById('promoteModal').classList.add('show');
}
function closePromoteModal() {
  document.getElementById('promoteModal').classList.remove('show');
  _promotingId = null;
}
function confirmPromote() {
  const r = getRecipe(_promotingId);
  if (!r) { closePromoteModal(); return; }
  const optionId = r.optionId;
  const base     = getBaseRecipe(optionId);
  const arcs     = getArchivedBases(optionId);
  const nextV    = arcs.length ? Math.max(...arcs.map(a => a.version)) + 1 : 1;
  // 현재 base 아카이브
  const opt = getOpt(optionId);
  const optName = opt ? opt.name : (base ? base.name.replace(/_v\d+$/, '') : '기본 레시피');
  if (base) {
    base.name       = `${optName}_v${nextV}`;
    base.version    = nextV;
    base.archivedAt = new Date().toISOString().slice(0, 10);
  }
  // 연구 레시피 → base 승격
  r.type    = 'base';
  r.version = null;
  r.name    = optName;
  delete r.archivedAt;
  if (r.hypothesis) r.hypothesis.status = 'adopted';
  persistMeta();
  closePromoteModal();
  renderRecipeEditor();
  showToast('기본 레시피로 승격되었습니다.');
}

// ── 아카이브 토글 ─────────────────────────────────────────
function toggleArchive(optionId) {
  const el = document.getElementById('arc-' + optionId);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ── STATUS 상수 ───────────────────────────────────────────
const STATUS_LABEL = { ongoing:'🔬 진행중', success:'✅ 성공', fail:'❌ 실패', adopted:'⭐ 기본 반영됨' };
const STATUS_CLS   = { ongoing:'status-ongoing', success:'status-success', fail:'status-fail', adopted:'status-adopted' };

function renderRecipeTab() {
  renderOptionSidebar();
  renderRecipeEditor();
}

function renderOptionSidebar() {
  const sidebar = document.getElementById('optionSidebar');
  sidebar.innerHTML = '';
  META.options.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'sidebar-item' + (opt.id === editingOptionId ? ' selected' : '');
    div.innerHTML = `
      <span class="option-dot" style="background:${opt.color}"></span>
      <span style="flex:1">${opt.name}</span>
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteOption('${opt.id}')">✕</button>`;
    div.onclick = () => { editingOptionId = opt.id; renderRecipeTab(); };
    sidebar.appendChild(div);
  });
  const addBtn = document.createElement('div');
  addBtn.className = 'sidebar-add';
  addBtn.textContent = '+ 맛 추가';
  addBtn.onclick = addOption;
  sidebar.appendChild(addBtn);
}

function renderRecipeEditor() {
  const wrap = document.getElementById('recipeEditorWrap');
  if (!editingOptionId) {
    wrap.innerHTML = '<div class="empty">좌측에서 맛을 선택하세요.</div>';
    return;
  }
  const opt      = getOpt(editingOptionId);
  const base     = getBaseRecipe(editingOptionId);
  const archives = getArchivedBases(editingOptionId);
  const research = getResearchRecipes(editingOptionId);

  let html = `
    <div class="section-hdr" style="margin-bottom:16px">
      <h3 style="display:flex;align-items:center;gap:8px">
        <span class="option-dot" style="background:${opt.color}"></span>
        <input value="${opt.name}" style="background:transparent;border:none;color:var(--text);font-size:14px;font-weight:600;width:160px"
          onchange="updateOptionName(this.value)">
        <input type="color" value="${opt.color}" title="색상 변경"
          style="width:28px;height:28px;border:none;border-radius:50%;cursor:pointer;background:none;padding:0"
          onchange="updateOptionColor(this.value)">
      </h3>
    </div>`;

  // ── 기본 레시피 ──────────────────────────────────────────
  // 활성 base가 여러 개인 경우(데이터 오류) 모두 표시
  const allActiveBases = META.recipes.filter(r => r.optionId === editingOptionId && r.type === 'base' && !r.version);
  html += `<div class="base-recipe-section">
    <div class="base-recipe-header">
      <span class="base-badge">BASE</span>
      <span style="font-size:14px;font-weight:700;flex:1">${base ? base.name : '기본 레시피 없음'}</span>
      <div style="display:flex;gap:6px">
        ${archives.length ? `<button class="btn btn-ghost btn-sm" onclick="toggleArchive('${editingOptionId}')">히스토리 (${archives.length})</button>` : ''}
        ${base ? `<button class="btn btn-ghost btn-sm" onclick="openCopyModal('${base.id}')">복사</button>` : ''}
      </div>
    </div>
    ${base ? renderBaseIngEditor(base) : `
      <div class="empty" style="padding:12px 0">기본 레시피가 없습니다.</div>
      <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="addBaseRecipe('${editingOptionId}')">+ 기본 레시피 추가</button>`}
  </div>`;
  // 중복 base 레시피 경고 (첫 번째 제외한 나머지)
  const extraBases = allActiveBases.slice(1);
  if (extraBases.length) {
    html += `<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:var(--r);padding:12px 16px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#856404;margin-bottom:8px">⚠ 중복 기본 레시피 발견 — 생산 등록에서 숨겨집니다. 삭제하세요.</div>
      ${extraBases.map(r => `
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid #ffeaa7">
          <span style="flex:1;font-size:13px;color:#333">${r.name}</span>
          <span style="font-size:12px;color:#666">재료 ${r.ingredients?.length || 0}개</span>
          <button class="btn btn-danger btn-sm" onclick="deleteRecipe('${r.id}')">삭제</button>
        </div>`).join('')}
    </div>`;
  }

  // ── 버전 히스토리 ─────────────────────────────────────────
  if (archives.length) {
    html += `<div id="arc-${editingOptionId}" style="display:none;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 20px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">이전 기본 레시피</div>
      <div class="archive-list">`;
    archives.forEach(a => {
      const c = recipeCost(a), v = batchVolume(a), p = v ? Math.round(c/v*120) : 0;
      html += `<div class="archive-item">
        <span class="archive-badge">v${a.version}</span>
        <span style="flex:1;color:var(--text)">${a.name}</span>
        <span style="font-size:12px">${a.archivedAt || ''}</span>
        <span style="font-size:12px">원가 ${fmt(c)} · 120g ${p}원</span>
      </div>`;
    });
    html += `</div></div>`;
  }

  // ── 연구 레시피 ───────────────────────────────────────────
  html += `<div>
    <div class="research-section-hdr">
      <span style="font-size:14px;font-weight:700">연구 레시피
        <span style="font-weight:400;color:var(--muted)">(${research.length})</span>
      </span>
      <button class="btn btn-primary btn-sm" onclick="openResearchModal('${editingOptionId}')">+ 연구 추가</button>
    </div>`;

  if (!research.length) {
    html += `<div class="empty" style="padding:28px;text-align:center;line-height:1.7">
      아직 연구 레시피가 없습니다.<br>
      <span style="font-size:12px">기본 레시피 대비 변경점을 실험하고 결과를 기록해보세요.</span>
    </div>`;
  } else {
    research.forEach(r => { html += renderResearchCard(r, base); });
  }
  html += `</div>`;
  wrap.innerHTML = html;
}

// ── 기본 레시피 재료 편집기 ───────────────────────────────
function renderBaseIngEditor(recipe) {
  const cost   = recipeCost(recipe);
  const vol    = batchVolume(recipe);
  const per120 = vol ? Math.round(cost / vol * 120) : 0;
  const ingRows = recipe.ingredients.map((ri, idx) => {
    const selOpts = META.ingredients.map(ing =>
      `<option value="${ing.id}" ${ing.id === ri.id ? 'selected' : ''}>${ing.name} (${ing.unit})</option>`
    ).join('');
    return `<div class="ing-row">
      <select class="ing-select" onchange="updateIngredient('${recipe.id}',${idx},'id',this.value)">${selOpts}</select>
      <input class="ing-qty" type="number" value="${ri.qty}" min="0" step="any"
        onchange="updateIngredient('${recipe.id}',${idx},'qty',this.value)">
      <span style="color:var(--muted);font-size:12px">${getIngr(ri.id)?.unit || ''}</span>
      <button class="btn btn-ghost btn-sm" onclick="removeIngredient('${recipe.id}',${idx})">✕</button>
    </div>`;
  }).join('');
  return `${ingRows}
    <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="addIngredientToRecipe('${recipe.id}')">+ 재료 추가</button>
    <div class="recipe-cost" id="rcost-${recipe.id}">
      배치 원가: <strong style="color:var(--green)">${fmt(cost)}</strong>
      &nbsp;·&nbsp; 120g당: <strong style="color:var(--accent)">${per120}원</strong>
      &nbsp;·&nbsp; 배치 용량: <span id="rvol-${recipe.id}">${vol.toLocaleString()}</span>g
      <span style="color:var(--muted);margin-left:4px">(재료비 × 1.1)</span>
    </div>`;
}

// ── 연구 레시피 카드 ──────────────────────────────────────
function renderResearchCard(r, base) {
  const hyp    = r.hypothesis || {};
  const status = hyp.status || 'ongoing';
  const deltas = computeDeltas(r, base);

  const deltaSummary = deltas.slice(0, 4).map(d => {
    const sign = d.delta > 0 ? '+' : '';
    const cls  = d.delta > 0 ? 'delta-pos' : 'delta-neg';
    const val  = Math.abs(d.delta) % 1 < 0.01 ? d.delta : d.delta.toFixed(1);
    return `<span class="${cls}">${d.name} ${sign}${val}${d.unit}</span>`;
  }).join(' &nbsp;·&nbsp; ');

  const deltaRows = deltas.map(d => {
    const sign = d.delta > 0 ? '+' : '';
    const cls  = d.delta > 0 ? 'delta-pos' : 'delta-neg';
    const val  = Math.abs(d.delta) % 1 < 0.01 ? d.delta : d.delta.toFixed(1);
    const pct  = d.baseQty > 0 ? ` (${sign}${((d.delta/d.baseQty)*100).toFixed(1)}%)` : '';
    return `<tr>
      <td>${d.name}</td>
      <td>${d.baseQty > 0 ? d.baseQty + d.unit : '—'}</td>
      <td>${d.resQty > 0 ? d.resQty + d.unit : '—'}</td>
      <td class="${cls}">${sign}${val}${d.unit}${pct}</td>
    </tr>`;
  }).join('');

  const deltaTable = deltas.length
    ? `<table class="delta-table">
        <thead><tr><th>재료</th><th>기본</th><th>연구</th><th>변경</th></tr></thead>
        <tbody>${deltaRows}</tbody>
       </table>`
    : `<div style="font-size:13px;color:var(--muted);margin:8px 0 10px">기본 레시피와 동일한 재료 구성</div>`;

  const rc = recipeCost(r), bc = base ? recipeCost(base) : 0;
  const rv = batchVolume(r), bv = base ? batchVolume(base) : 0;
  const rp = rv ? Math.round(rc/rv*120) : 0;
  const bp = bv ? Math.round(bc/bv*120) : 0;
  const dC = rc - bc, dP = rp - bp;
  const costStr = base ? ` <span class="${dC>=0?'delta-neg':'delta-pos'}" style="font-size:12px">(${dC>=0?'+':''}${fmt(dC)})</span>` : '';
  const perStr  = base ? ` <span class="${dP>=0?'delta-neg':'delta-pos'}" style="font-size:12px">(${dP>=0?'+':''}${dP}원)</span>` : '';

  const srcHtml = (hyp.sources||[]).map(s => {
    const icon = {paper:'📄',blog:'🔗',book:'📚',other:'📎'}[s.type]||'📎';
    return s.url
      ? `<a class="source-chip" href="${s.url}" target="_blank" rel="noopener">${icon} ${s.title}</a>`
      : `<span class="source-chip" style="color:var(--muted);cursor:default">${icon} ${s.title}</span>`;
  }).join('');

  return `<div class="research-card">
    <div class="research-card-header">
      <div>
        <div class="research-card-title">${hyp.title || r.name}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">${deltaSummary || '재료 변경 없음'}</div>
      </div>
      <span class="status-badge ${STATUS_CLS[status]}">${STATUS_LABEL[status]}</span>
    </div>
    ${deltaTable}
    <div style="font-size:13px;color:var(--muted)">
      배치 원가: <strong style="color:var(--text)">${fmt(rc)}</strong>${costStr}
      &nbsp;·&nbsp; 120g당: <strong style="color:var(--text)">${rp}원</strong>${perStr}
    </div>
    ${hyp.reason ? `<div style="margin-top:12px"><div class="hyp-label">가설 이유</div><div class="hyp-text">${hyp.reason.replace(/\n/g,'<br>')}</div></div>` : ''}
    ${srcHtml    ? `<div style="margin-top:10px"><div class="hyp-label">출처</div><div style="margin-top:4px">${srcHtml}</div></div>` : ''}
    ${hyp.result ? `<div style="margin-top:10px"><div class="hyp-label">결과 메모</div><div class="hyp-text">${hyp.result.replace(/\n/g,'<br>')}</div></div>` : ''}
    <div style="display:flex;gap:8px;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
      <button class="btn btn-ghost btn-sm" onclick="openResearchModal('${r.optionId}','${r.id}')">수정</button>
      ${status !== 'adopted' ? `<button class="btn btn-primary btn-sm" onclick="openPromoteModal('${r.id}')">기본으로 승격 ↑</button>` : ''}
      <button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="deleteResearchRecipe('${r.id}')">삭제</button>
    </div>
  </div>`;
}

function addBaseRecipe(optionId) {
  const opt = getOpt(optionId);
  const r = { id:'r'+uid(), optionId, name: opt ? opt.name : '기본 레시피', type:'base', version:null, ingredients:[] };
  META.recipes.push(r); persistMeta(); renderRecipeEditor();
}
function deleteResearchRecipe(id) {
  if (!confirm('연구 레시피를 삭제하시겠습니까?')) return;
  META.recipes = META.recipes.filter(r => r.id !== id);
  persistMeta(); renderRecipeEditor(); showToast('삭제되었습니다.');
}

function updateOptionName(val) {
  const opt = getOpt(editingOptionId);
  if (opt) { opt.name = val; persistMeta(); renderOptionSidebar(); }
}
function updateOptionColor(val) {
  const opt = getOpt(editingOptionId);
  if (opt) { opt.color = val; persistMeta(); renderOptionSidebar(); }
}
function addOption() {
  const name = prompt('새 맛 이름:');
  if (!name) return;
  const o = { id: 'o' + uid(), name, color: '#5794f2' };
  META.options.push(o);
  editingOptionId = o.id;
  persistMeta(); renderRecipeTab();
}
function deleteOption(id) {
  if (!confirm('이 맛과 연결된 레시피도 모두 삭제됩니다. 계속하시겠습니까?')) return;
  META.options = META.options.filter(o => o.id !== id);
  META.recipes = META.recipes.filter(r => r.optionId !== id);
  if (editingOptionId === id) editingOptionId = META.options[0]?.id || null;
  persistMeta(); renderRecipeTab();
}
// ═══════════════════════════════════════════════════════════
// 연구 레시피 모달 로직
// ═══════════════════════════════════════════════════════════
let _rm = { optionId: null, editId: null, sources: [] };

function openResearchModal(optionId, editId) {
  _rm = { optionId, editId: editId || null, sources: [] };
  const base   = getBaseRecipe(optionId);
  const isEdit = !!editId;
  document.getElementById('rmTitle').textContent = isEdit ? '연구 레시피 수정' : '연구 레시피 추가';

  if (isEdit) {
    const r = getRecipe(editId), hyp = r.hypothesis || {};
    document.getElementById('rm-title').value  = hyp.title  || '';
    document.getElementById('rm-reason').value = hyp.reason || '';
    document.getElementById('rm-result').value = hyp.result || '';
    document.getElementById('rm-status').value = hyp.status || 'ongoing';
    _rm.sources = JSON.parse(JSON.stringify(hyp.sources || []));
  } else {
    ['rm-title','rm-reason','rm-result'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('rm-status').value = 'ongoing';
    _rm.sources = [];
  }

  rmRenderSources();
  rmBuildDeltaTable(base, isEdit ? getRecipe(editId) : null);
  document.getElementById('researchModal').classList.add('show');
}
function closeResearchModal() {
  document.getElementById('researchModal').classList.remove('show');
}

// ── 출처 관리 ─────────────────────────────────────────────
function rmRenderSources() {
  document.getElementById('rm-sources-list').innerHTML = _rm.sources.map((s, i) => {
    const icon = {paper:'📄',blog:'🔗',book:'📚',other:'📎'}[s.type]||'📎';
    return `<div class="src-row" style="background:var(--bg);border-radius:6px;padding:4px 8px;margin-bottom:4px">
      <span style="font-size:14px">${icon}</span>
      <span style="flex:1;font-size:13px">${s.title}${s.url?` <span style="color:var(--muted);font-size:11px">— ${s.url}</span>`:''}</span>
      <button class="btn btn-ghost btn-sm" onclick="rmRemoveSrc(${i})">✕</button>
    </div>`;
  }).join('');
}
function rmAddSource() {
  const type  = document.getElementById('rm-src-type').value;
  const title = document.getElementById('rm-src-title').value.trim();
  const url   = document.getElementById('rm-src-url').value.trim();
  if (!title) { showToast('출처 제목을 입력해주세요.'); return; }
  _rm.sources.push({ type, title, url });
  document.getElementById('rm-src-title').value = '';
  document.getElementById('rm-src-url').value   = '';
  rmRenderSources();
}
function rmRemoveSrc(idx) { _rm.sources.splice(idx, 1); rmRenderSources(); }

// ── 델타 테이블 ───────────────────────────────────────────
function rmBuildDeltaTable(base, editRecipe) {
  document.getElementById('rm-base-label').textContent =
    base ? `기준 레시피: ${base.name}` : '기본 레시피가 없습니다.';
  const tbody = document.getElementById('rm-delta-body');
  if (!base) { tbody.innerHTML = '<tr><td colspan="4" style="color:var(--muted);padding:10px">먼저 기본 레시피를 추가해주세요.</td></tr>'; return; }

  const baseIds = new Set(base.ingredients.map(ri => ri.id));
  const extras  = editRecipe ? editRecipe.ingredients.filter(ri => !baseIds.has(ri.id)) : [];

  const rows = [
    ...base.ingredients.map(ri => ({ id:ri.id, baseQty:ri.qty, isExtra:false })),
    ...extras.map(ri => ({ id:ri.id, baseQty:0, isExtra:true }))
  ];

  tbody.innerHTML = rows.map(({ id, baseQty, isExtra }) => {
    const ing    = getIngr(id);
    const name   = ing ? ing.name : id;
    const unit   = ing ? ing.unit : '';
    const resQty = editRecipe ? (editRecipe.ingredients.find(ri => ri.id === id)?.qty || 0) : baseQty;
    const delta  = resQty - baseQty;
    return rmRow(id, name, unit, baseQty, resQty, delta, isExtra);
  }).join('');
  rmRefreshCost(base);
}
function rmRow(ingId, name, unit, baseQty, resQty, delta, isExtra) {
  const dStr = delta !== 0 ? (delta > 0 ? '+' : '') + (Math.abs(delta) % 1 < 0.01 ? delta : delta.toFixed(1)) : '0';
  const dCls = delta > 0 ? 'pos' : (delta < 0 ? 'neg' : '');
  const resFmt = resQty > 0 ? (resQty % 1 < 0.01 ? resQty : resQty.toFixed(1)) + unit : (isExtra ? '—' : baseQty + unit);
  return `<tr data-ing="${ingId}" data-base="${baseQty}">
    <td>${name}${isExtra ? ' <span style="color:var(--accent);font-size:11px">[신규]</span>' : ''}</td>
    <td style="color:var(--muted)">${baseQty > 0 ? baseQty + unit : '—'}</td>
    <td><input class="di ${dCls}" data-ing="${ingId}" type="number" value="${dStr}" step="any"
      oninput="rmOnChange(this,'${ingId}',${baseQty},'${unit}')"></td>
    <td class="res-qty ${dCls}" id="rmr-${ingId}">${resFmt}</td>
  </tr>`;
}
function rmOnChange(inp, ingId, baseQty, unit) {
  const delta  = parseFloat(inp.value) || 0;
  const resQty = baseQty + delta;
  inp.className = 'di ' + (delta > 0 ? 'pos' : (delta < 0 ? 'neg' : ''));
  const el = document.getElementById('rmr-' + ingId);
  if (el) {
    el.textContent = (resQty > 0 ? (resQty % 1 < 0.01 ? resQty : resQty.toFixed(1)) : '0') + unit;
    el.className   = 'res-qty ' + (delta > 0 ? 'pos' : (delta < 0 ? 'neg' : ''));
  }
  rmRefreshCost(getBaseRecipe(_rm.optionId));
}
function rmAddExtraIngredient() {
  const base    = getBaseRecipe(_rm.optionId);
  const usedIds = new Set([
    ...(base?.ingredients || []).map(ri => ri.id),
    ...[...document.querySelectorAll('#rm-delta-body tr[data-ing]')].map(tr => tr.getAttribute('data-ing'))
  ]);
  const ing = META.ingredients.find(i => !usedIds.has(i.id));
  if (!ing) { showToast('추가할 수 있는 재료가 없습니다.'); return; }
  document.getElementById('rm-delta-body').innerHTML += rmRow(ing.id, ing.name, ing.unit, 0, 0, 0, true);
  rmRefreshCost(base);
}
function rmCollectIngredients(base) {
  return [...document.querySelectorAll('#rm-delta-body tr[data-ing]')].map(tr => {
    const ingId   = tr.getAttribute('data-ing');
    const baseQty = parseFloat(tr.getAttribute('data-base')) || 0;
    const delta   = parseFloat(tr.querySelector('.di')?.value) || 0;
    const resQty  = baseQty + delta;
    return resQty > 0.001 ? { id: ingId, qty: resQty } : null;
  }).filter(Boolean);
}
function rmRefreshCost(base) {
  const ings = rmCollectIngredients(base);
  const tmp  = { ingredients: ings };
  const rc = recipeCost(tmp), bc = base ? recipeCost(base) : 0;
  const rv = batchVolume(tmp), bv = base ? batchVolume(base) : 0;
  const rp = rv ? Math.round(rc/rv*120) : 0;
  const bp = bv ? Math.round(bc/bv*120) : 0;
  const dC = rc - bc, dP = rp - bp;
  document.getElementById('rm-cost-bar').innerHTML =
    `배치 원가: <strong>${fmt(rc)}</strong> <span style="color:${dC>=0?'#dc2626':'#16a34a'};font-size:12px">(${dC>=0?'+':''}${fmt(dC)})</span>` +
    ` &nbsp;·&nbsp; 120g당: <strong>${rp}원</strong> <span style="color:${dP>=0?'#dc2626':'#16a34a'};font-size:12px">(${dP>=0?'+':''}${dP}원)</span>`;
}
function saveResearchRecipe() {
  const title  = document.getElementById('rm-title').value.trim();
  const reason = document.getElementById('rm-reason').value.trim();
  const result = document.getElementById('rm-result').value.trim();
  const status = document.getElementById('rm-status').value;
  if (!title) { showToast('연구 제목을 입력해주세요.'); return; }

  const base = getBaseRecipe(_rm.optionId);
  const ings = rmCollectIngredients(base);
  const hyp  = { title, reason, result, status, sources: [..._rm.sources] };

  if (_rm.editId) {
    const r = getRecipe(_rm.editId);
    if (r) { r.hypothesis = hyp; r.ingredients = ings; r.name = title; }
  } else {
    META.recipes.push({
      id: 'r' + uid(), optionId: _rm.optionId, name: title,
      type: 'research', baseRecipeId: base?.id || null, hypothesis: hyp, ingredients: ings
    });
  }
  persistMeta(); closeResearchModal(); renderRecipeEditor();
  showToast(_rm.editId ? '수정되었습니다.' : '연구 레시피가 추가되었습니다.');
}

// ── 기존 addRecipe는 base 타입으로 ────────────────────────
function addRecipe(optionId) {
  const r = { id: 'r' + uid(), optionId, name: '새 레시피', type: 'base', version: null, ingredients: [] };
  META.recipes.push(r);
  persistMeta(); renderRecipeEditor();
}
function deleteRecipe(id) {
  if (!confirm('레시피를 삭제하시겠습니까?')) return;
  META.recipes = META.recipes.filter(r => r.id !== id);
  persistMeta(); renderRecipeEditor();
}

let copyingRecipeId = null;
function openCopyModal(recipeId) {
  copyingRecipeId = recipeId;
  const sel = document.getElementById('copyTargetSelect');
  sel.innerHTML = META.options.map(o =>
    `<option value="${o.id}">${o.name}</option>`
  ).join('');
  // 기본 선택: 현재 맛 이외 첫 번째, 없으면 현재 맛
  const src = getRecipe(recipeId);
  const other = META.options.find(o => o.id !== (src && src.optionId));
  if (other) sel.value = other.id;
  document.getElementById('copyModal').classList.add('show');
}
function closeCopyModal() {
  document.getElementById('copyModal').classList.remove('show');
  copyingRecipeId = null;
}
function confirmCopy() {
  const src = getRecipe(copyingRecipeId);
  if (!src) { closeCopyModal(); return; }
  const targetId = document.getElementById('copyTargetSelect').value;
  const target   = META.options.find(o => o.id === targetId);
  if (!target) { closeCopyModal(); return; }

  const newRecipe = {
    id: 'r' + uid(),
    optionId: targetId,
    name: target.name,
    type: 'base', version: null,
    ingredients: JSON.parse(JSON.stringify(src.ingredients))
  };
  META.recipes.push(newRecipe);
  persistMeta();
  closeCopyModal();

  // 복사 대상 맛으로 이동
  editingOptionId = targetId;
  renderRecipeTab();
  showToast(`"${src.name}"을 ${target.name}으로 복사했습니다.`);
}
function updateRecipeName(id, val) {
  const r = getRecipe(id);
  if (r) { r.name = val; persistMeta(); refreshRecipeCost(id); }
}
function updateIngredient(recipeId, idx, field, val) {
  const r = getRecipe(recipeId);
  if (!r) return;
  if (field === 'qty') r.ingredients[idx].qty = parseFloat(val) || 0;
  if (field === 'id')  r.ingredients[idx].id  = val;
  persistMeta(); refreshRecipeCost(recipeId);
}
function addIngredientToRecipe(recipeId) {
  const r   = getRecipe(recipeId);
  const ing = META.ingredients[0];
  if (!r || !ing) return;
  r.ingredients.push({ id: ing.id, qty: 0 });
  persistMeta(); renderRecipeEditor();
}
function removeIngredient(recipeId, idx) {
  const r = getRecipe(recipeId);
  if (!r) return;
  r.ingredients.splice(idx, 1);
  persistMeta(); renderRecipeEditor();
}
function refreshRecipeCost(recipeId) {
  const r    = getRecipe(recipeId);
  if (!r) return;
  const cost   = recipeCost(r);
  const vol    = batchVolume(r);
  const per120 = vol ? Math.round(cost / vol * 120) : 0;
  const el     = document.getElementById('rcost-' + recipeId);
  if (el) el.innerHTML =
    `배치 원가: <strong style="color:var(--green)">${fmt(cost)}</strong> &nbsp;·&nbsp; 120g당: <strong style="color:var(--accent)">${per120}원</strong> <span style="color:var(--muted)">(재료비 × 1.1 손실 포함)</span>`;
  const velEl  = document.getElementById('rvol-' + recipeId);
  if (velEl) velEl.textContent = vol.toLocaleString();
}

// ═══════════════════════════════════════════════════════════
// 탭 4: 재료 관리
// ═══════════════════════════════════════════════════════════
function renderIngrTable() {
  document.getElementById('ingrTableBody').innerHTML =
    META.ingredients.map((ing, idx) => {
      const url = ing.url || '';
      const linkIcon = url
        ? `<a href="${url}" target="_blank" rel="noopener" class="url-link" title="${url}">🔗 링크</a>`
        : '';
      return `
        <tr>
          <td><input class="cell-input" value="${ing.name}"
            onchange="META.ingredients[${idx}].name=this.value;persistMeta()"></td>
          <td><input class="cell-input" value="${ing.unit}" style="width:60px"
            onchange="META.ingredients[${idx}].unit=this.value;persistMeta()"></td>
          <td><input class="cell-input" type="number" value="${ing.price}" step="any" min="0" style="width:120px"
                onchange="META.ingredients[${idx}].price=parseFloat(this.value)||0;persistMeta()"></td>
          <td style="min-width:220px">
            <div style="display:flex;align-items:center;gap:6px">
              <input class="cell-input" type="url" value="${url}" placeholder="https://…"
                onchange="META.ingredients[${idx}].url=this.value;persistMeta();renderIngrTable()"
                style="flex:1;font-size:12px">
              ${linkIcon}
            </div>
          </td>
          <td><button class="btn btn-ghost btn-sm" onclick="deleteIngredient(${idx})">✕</button></td>
        </tr>`;
    }).join('');
}

function addIngredient() {
  META.ingredients.push({ id: 'i' + uid(), name: '새 재료', unit: 'g', price: 0, url: '' });
  persistMeta();
  renderIngrTable();
}
function deleteIngredient(idx) {
  if (!confirm(`"${META.ingredients[idx].name}" 재료를 삭제할까요?`)) return;
  const id = META.ingredients[idx].id;
  META.ingredients.splice(idx, 1);
  META.recipes.forEach(r => { r.ingredients = r.ingredients.filter(ri => ri.id !== id); });
  persistMeta();
  renderIngrTable();
}

// ═══════════════════════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════════════════════
async function init() {
  migrateRecipeTypes(); // 기존 레시피에 type:'base' 추가 (1회성)

  // 초기 탭: URL 해시 우선, 없으면 생산 관리
  const initHash = location.hash.slice(1);
  const startTab = TAB_IDX.hasOwnProperty(initHash) ? initHash : 'prod';
  switchTab(startTab);

  // API에서 최신 메타 로드 후 재렌더
  const updated = await loadMetaFromAPI();
  if (updated) {
    migrateRecipeTypes(); // API 데이터에도 마이그레이션 적용
    renderProdOptions();
    if (document.getElementById('tab-recipe').classList.contains('active')) renderRecipeTab();
    if (document.getElementById('tab-ingr').classList.contains('active'))   renderIngrTable();
  }
}

init();
</script>
