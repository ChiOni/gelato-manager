<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>젤라또 매니저</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Grafana 다크 테마 ─────────────────────────────── */
:root{
  --bg:#111217; --panel:#181b1f; --border:#2c2f35;
  --text:#d8d9da; --muted:#8e9196; --accent:#5794f2;
  --green:#73bf69; --yellow:#fade2a; --red:#f2495c;
  --orange:#ff9830; --purple:#b877d9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:14px;min-height:100vh}

/* ── 탭 네비 ─────────────────────────────────────── */
.nav{display:flex;background:var(--panel);border-bottom:1px solid var(--border);padding:0 16px;gap:4px}
.nav-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:12px 20px;font-size:14px;border-bottom:2px solid transparent;transition:.15s}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

.tab{display:none;padding:20px;max-width:1200px;margin:0 auto}
.tab.active{display:block}

/* ── 공용 카드 ───────────────────────────────────── */
.card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px}
.card-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}

/* ── 생산 추이 차트 ───────────────────────────────── */
.trend-period-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── 생산 등록 ─────────────────────────────────────── */
.option-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.option-card{background:var(--panel);border:2px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:.15s;text-align:center}
.option-card:hover{border-color:var(--muted)}
.option-card.selected{border-color:var(--accent);background:#1a2030}
.option-dot{width:14px;height:14px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.option-name{font-weight:600}

.recipe-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.recipe-item{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.15s}
.recipe-item:hover{border-color:var(--muted)}
.recipe-item.selected{border-color:var(--accent)}
.recipe-meta{font-size:12px;color:var(--muted);margin-top:2px}

.step-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.step-box{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px}

.ingredient-preview{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.ing-tag{background:#1f2329;border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:12px;color:var(--text)}

.batch-row{display:flex;align-items:center;gap:12px;margin-top:12px}
.batch-input{background:#1f2329;border:1px solid var(--border);color:var(--text);border-radius:4px;padding:8px 12px;font-size:20px;font-weight:700;width:100px;text-align:center}
.cost-preview{font-size:13px;color:var(--muted);margin-top:4px}
.cost-highlight{color:var(--green);font-weight:600}

/* ── 버튼 ─────────────────────────────────────────── */
.btn{border:none;border-radius:4px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:default}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--muted)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}

/* ── 레시피 관리 ───────────────────────────────────── */
.mgmt-layout{display:grid;grid-template-columns:240px 1fr;gap:16px}
@media(max-width:700px){.mgmt-layout{grid-template-columns:1fr}}
.option-sidebar{display:flex;flex-direction:column;gap:6px}
.sidebar-item{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.15s}
.sidebar-item:hover{border-color:var(--muted)}
.sidebar-item.selected{border-color:var(--accent);color:var(--accent)}
.sidebar-add{text-align:center;color:var(--muted);border:1px dashed var(--border);border-radius:6px;padding:10px;cursor:pointer}
.sidebar-add:hover{border-color:var(--accent);color:var(--accent)}

.recipe-editor{display:flex;flex-direction:column;gap:12px}
.recipe-row{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:14px}
.recipe-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.recipe-name-input{background:#1f2329;border:1px solid var(--border);color:var(--text);border-radius:4px;padding:6px 10px;font-size:14px;font-weight:600;width:220px}
.yield-input{background:#1f2329;border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 8px;width:90px}
.ph-inp{background:#1f2329;border:1px solid var(--border);color:var(--text);border-radius:3px;padding:2px 4px;font-size:12px;text-align:center}
.ph-inp:focus{outline:none;border-color:var(--accent)}
.ph-sep{color:var(--border);font-size:11px;user-select:none}
#prodHistory{overflow-x:auto}
#prodHistory table td{padding:5px 6px}
#prodHistory table th{padding:6px 6px}
#prodHistory select.ph-inp{text-align:left;padding:2px 4px}

.ing-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.ing-select{background:#1f2329;border:1px solid var(--border);color:var(--text);border-radius:4px;padding:5px 8px;min-width:140px}
.ing-qty{background:#1f2329;border:1px solid var(--border);color:var(--text);border-radius:4px;padding:5px 8px;width:80px}

.recipe-cost{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}

/* ── 재료 관리 ─────────────────────────────────────── */
table{width:100%;border-collapse:collapse}
th{background:#1f2329;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
.cell-input{background:transparent;border:none;color:var(--text);width:100%;font-size:13px;padding:2px 0}
.cell-input:focus{outline:1px solid var(--accent);border-radius:2px;background:#1f2329;padding:2px 4px}

/* ── 공용 ─────────────────────────────────────────── */
.row-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.toast{position:fixed;bottom:24px;right:24px;background:#2c2f35;border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:6px;z-index:9999;opacity:0;transition:.3s;font-size:13px}
.toast.show{opacity:1}
.empty{color:var(--muted);text-align:center;padding:40px;font-size:13px}
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-hdr h3{font-size:14px;font-weight:600}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.url-link{color:var(--accent);text-decoration:none;font-size:12px}
.url-link:hover{text-decoration:underline}
/* copy modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:24px;min-width:280px}
.modal-box h4{margin-bottom:16px;font-size:14px}
.modal-select{width:100%;background:#1f2329;border:1px solid var(--border);color:var(--text);border-radius:4px;padding:8px;font-size:13px;margin-bottom:16px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>

<!-- ── 네비 ──────────────────────────────────────── -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('prod')">생산 관리</button>
  <button class="nav-btn" onclick="switchTab('recipe')">레시피 관리</button>
  <button class="nav-btn" onclick="switchTab('ingr')">재료 관리</button>
</nav>

<!-- ══════════════════════════════════════════════
     탭 1: 생산 관리
════════════════════════════════════════════════ -->
<div id="tab-prod" class="tab active">

  <!-- 주별/월별 생산량 추이 차트 -->
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="card-title" style="margin-bottom:0">주별 생산량 추이</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm trend-period-btn active" data-period="week" onclick="setProdTrendPeriod('week')">주간</button>
        <button class="btn btn-ghost btn-sm trend-period-btn" data-period="month" onclick="setProdTrendPeriod('month')">월간</button>
      </div>
    </div>
    <div id="prodTrendFlavorFilter" style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px"></div>
    <canvas id="chartProdTrend" height="160"></canvas>
  </div>

  <!-- Step 1: 맛 선택 -->
  <div class="step-box">
    <div class="step-label">Step 1 — 맛 선택</div>
    <div class="option-grid" id="prodOptionGrid"></div>
  </div>

  <!-- Step 2: 레시피 선택 -->
  <div class="step-box" id="prodStep2" style="display:none">
    <div class="step-label">Step 2 — 레시피 선택</div>
    <div class="recipe-list" id="prodRecipeList"></div>
  </div>

  <!-- Step 3: 배치 수 입력 -->
  <div class="step-box" id="prodStep3" style="display:none">
    <div class="step-label">Step 3 — 배치 수 입력</div>
    <div id="prodIngPreview" class="ingredient-preview"></div>
    <div class="batch-row">
      <input id="prodBatchInput" class="batch-input" type="number" min="1" value="1">
      <span style="color:var(--muted)">배치</span>
    </div>
    <div style="margin-top:10px;display:flex;align-items:center;gap:4px;flex-wrap:wrap">
      <span style="color:var(--muted);font-size:13px;margin-right:4px">생산 일시</span>
      <input id="ptY" type="number" min="2020" max="2099" style="width:62px;background:#1f2329;border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 6px;font-size:13px">
      <span style="color:var(--muted)">년</span>
      <input id="ptM" type="number" min="1" max="12" style="width:42px;background:#1f2329;border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 6px;font-size:13px">
      <span style="color:var(--muted)">월</span>
      <input id="ptD" type="number" min="1" max="31" style="width:42px;background:#1f2329;border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 6px;font-size:13px">
      <span style="color:var(--muted)">일</span>
      <input id="ptH" type="number" min="0" max="23" style="width:42px;background:#1f2329;border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 6px;font-size:13px">
      <span style="color:var(--muted)">시</span>
    </div>
    <div id="prodCostPreview" class="cost-preview"></div>
    <div class="row-btns">
      <button class="btn btn-primary" id="prodSubmitBtn" onclick="submitProduction()">생산 등록</button>
    </div>
  </div>

  <!-- 생산 이력 -->
  <div class="card" style="margin-top:8px">
    <div class="card-title">최근 생산 이력</div>
    <div id="prodHistory"><div class="empty">로드 중…</div></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     탭 3: 레시피 관리
════════════════════════════════════════════════ -->
<div id="tab-recipe" class="tab">
  <div class="mgmt-layout">
    <!-- 좌: 옵션 사이드바 -->
    <div>
      <div class="section-hdr">
        <h3>맛</h3>
        <button class="btn btn-ghost btn-sm" onclick="addOption()">+ 추가</button>
      </div>
      <div class="option-sidebar" id="optionSidebar"></div>
    </div>
    <!-- 우: 레시피 에디터 -->
    <div id="recipeEditorWrap">
      <div class="empty">좌측에서 옵션을 선택하세요.</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     탭 4: 재료 관리
════════════════════════════════════════════════ -->
<div id="tab-ingr" class="tab">
  <div class="card">
    <div class="section-hdr">
      <h3>재료 목록</h3>
      <button class="btn btn-ghost btn-sm" onclick="addIngredient()">+ 재료 추가</button>
    </div>
    <table>
      <thead><tr><th>이름</th><th>단위</th><th>단가 (원/단위)</th><th>구매처 링크</th><th></th></tr></thead>
      <tbody id="ingrTableBody"></tbody>
    </table>
  </div>
  <!-- 재료 변경은 onchange에서 자동 저장됩니다 -->
</div>

<!-- copy modal -->
<div class="modal-overlay" id="copyModal">
  <div class="modal-box">
    <h4>레시피 복사 — 어느 맛으로?</h4>
    <select class="modal-select" id="copyTargetSelect"></select>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeCopyModal()">취소</button>
      <button class="btn btn-primary" onclick="confirmCopy()">복사</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════════════════════════
const API    = 'https://script.google.com/macros/s/AKfycbxgye70JFDlNUPNtokT2N60hqcor5Pl5ZomQvCoPu203OSnfb6HyItrn-Pqt-BeAIwj/exec';
const LS_KEY = 'gelato_metadata_v3';

const DEFAULT_METADATA = {
  ingredients: [
    {id:'i01', name:'우유',            unit:'g', price:1.483,  url:''},
    {id:'i02', name:'생크림 35%',      unit:'g', price:12.5,   url:''},

    {id:'i06', name:'덱스트로스',      unit:'g', price:3.976,  url:''},

    {id:'i08', name:'바나나',          unit:'g', price:10.0,   url:''},
    {id:'i09', name:'요거트 파우더',   unit:'g', price:9.0,    url:''},
    {id:'i10', name:'레몬청',          unit:'g', price:9.0,    url:''},
    {id:'i11', name:'호지차',          unit:'g', price:100.0,  url:''},
    {id:'i12', name:'한라봉필',        unit:'g', price:9.167,  url:''},
    {id:'i13', name:'아몬드 페이스트', unit:'g', price:31.25,  url:''},
    {id:'i14', name:'말차',            unit:'g', price:30.0,   url:''},
    {id:'i15', name:'딸기',            unit:'g', price:9.333,  url:''},
    {id:'i16', name:'초코 베이스',     unit:'g', price:8.421,  url:''},

  ],
  options: [
    {id:'o01', name:'바나나',       color:'#fade2a'},
    {id:'o02', name:'생크림밀크',   color:'#5794f2'},
    {id:'o03', name:'레몬요거트',   color:'#73bf69'},
    {id:'o04', name:'호지차한라봉', color:'#ff9830'},
    {id:'o05', name:'아몬드',       color:'#b877d9'},
    {id:'o06', name:'말차',         color:'#a0d898'},
    {id:'o07', name:'딸기소르베',   color:'#f2495c'},
    {id:'o08', name:'초코',         color:'#c67e3a'},
  ],
  recipes: [
    {id:'r01', optionId:'o01', name:'바나나 기본',
     ingredients:[{id:'i01',qty:1500},{id:'i02',qty:277.5},{id:'i03',qty:66},{id:'i04',qty:276},{id:'i05',qty:42.9},{id:'i06',qty:82.35},{id:'i07',qty:11.25},{id:'i08',qty:450}]},
    {id:'r02', optionId:'o02', name:'생크림밀크 기본',
     ingredients:[{id:'i01',qty:1500},{id:'i02',qty:755.4},{id:'i03',qty:66},{id:'i04',qty:276},{id:'i05',qty:42.9},{id:'i06',qty:82.35},{id:'i07',qty:11.25}]},
    {id:'r03', optionId:'o03', name:'레몬요거트 기본',
     ingredients:[{id:'i01',qty:1500},{id:'i02',qty:277.5},{id:'i03',qty:66},{id:'i04',qty:276},{id:'i05',qty:42.9},{id:'i06',qty:82.35},{id:'i07',qty:11.25},{id:'i09',qty:375},{id:'i10',qty:150}]},
    {id:'r04', optionId:'o04', name:'호지차한라봉 기본',
     ingredients:[{id:'i01',qty:1500},{id:'i02',qty:277.5},{id:'i03',qty:66},{id:'i04',qty:230},{id:'i05',qty:42.9},{id:'i06',qty:82.35},{id:'i07',qty:11.25},{id:'i11',qty:30},{id:'i12',qty:75}]},
    {id:'r05', optionId:'o05', name:'아몬드 기본',
     ingredients:[{id:'i01',qty:1500},{id:'i02',qty:277.5},{id:'i03',qty:66},{id:'i04',qty:276},{id:'i05',qty:42.9},{id:'i06',qty:82.35},{id:'i07',qty:11.25},{id:'i13',qty:225}]},
    {id:'r06', optionId:'o06', name:'말차 기본',
     ingredients:[{id:'i01',qty:1500},{id:'i02',qty:277.5},{id:'i03',qty:66},{id:'i04',qty:230},{id:'i05',qty:42.9},{id:'i06',qty:82.35},{id:'i07',qty:11.25},{id:'i14',qty:195}]},
    {id:'r07', optionId:'o07', name:'딸기소르베 기본',
     ingredients:[{id:'i15',qty:1500},{id:'i04',qty:345},{id:'i05',qty:64.35},{id:'i06',qty:123.525},{id:'i07',qty:16.875}]},
    {id:'r08', optionId:'o08', name:'초코 기본',
     ingredients:[{id:'i16',qty:2850},{id:'i17',qty:1}]},
  ]
};

let META            = loadMetaLocal();
let selOptionId     = null;   // 생산 등록: 선택된 옵션
let selRecipeId     = null;   // 생산 등록: 선택된 레시피
let editingOptionId = null;   // 레시피 관리: 선택된 옵션
let chartProdTrend  = null;
let prodTrendPeriod = 'week';
let prodRawData     = [];
let prodTrendFlavorFilter = null; // Set or null (null = 미초기화)

// ═══════════════════════════════════════════════════════════
// 탭 전환
// ═══════════════════════════════════════════════════════════
const TAB_IDX = {prod:0, recipe:1, ingr:2};

function switchTab(name) {
  if (!TAB_IDX.hasOwnProperty(name)) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn')[TAB_IDX[name]].classList.add('active');

  if (location.hash.slice(1) !== name) history.replaceState(null, '', '#' + name);

  if (name === 'prod')   { renderProdOptions(); loadProdHistory(); }
  if (name === 'recipe') renderRecipeTab();
  if (name === 'ingr')   renderIngrTable();
}

window.addEventListener('hashchange', () => {
  const h = location.hash.slice(1);
  if (TAB_IDX.hasOwnProperty(h)) switchTab(h);
});

// ═══════════════════════════════════════════════════════════
// 로컬스토리지
// ═══════════════════════════════════════════════════════════
function loadMetaLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_METADATA));
}

// 유틸
// ═══════════════════════════════════════════════════════════
function uid()      { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function fmt(n)     { return Math.round(n).toLocaleString('ko-KR') + '원'; }
function getIngr(id)   { return META.ingredients.find(i => i.id === id); }
function getOpt(id)    { return META.options.find(o => o.id === id); }
function getRecipe(id) { return META.recipes.find(r => r.id === id); }

// KST 유틸 ─────────────────────────────────────────────────
// 항상 KST(+09:00) 기준으로 처리
const pad2 = n => String(n).padStart(2, '0');

function kstNow() {
  // UTC ms → KST ms → 각 필드 추출 (getUTC* 사용)
  const d = new Date(Date.now() + 9 * 3600 * 1000);
  return { y: d.getUTCFullYear(), m: d.getUTCMonth() + 1, d: d.getUTCDate(), h: d.getUTCHours() };
}

// 저장할 시각 문자열: YYYY-MM-DDTHH:00:00+09:00
function buildKstStr(y, m, d, h) {
  return `${y}-${pad2(m)}-${pad2(d)}T${pad2(h)}:00:00+09:00`;
}

// 이력 표시용
// 새 형식 "YYYY-MM-DD HH:mm" → 이미 KST, 변환 없이 표시
// 구 형식 UTC ISO → +9h 변환
function fmtKST(timeStr) {
  if (!timeStr) return '';
  const s = String(timeStr);
  if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}/.test(s)) {
    return s.slice(0, 10) + ' ' + s.slice(11, 13) + '시';
  }
  const ms = Date.parse(s);
  if (isNaN(ms)) return s.slice(0, 13).replace('T', ' ') + '시';
  const d = new Date(ms + 9 * 3600 * 1000);
  return `${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}-${pad2(d.getUTCDate())} ${d.getUTCHours()}시`;
}

// 수정 UI용: KST 필드 추출
function parseKST(timeStr) {
  if (!timeStr) return kstNow();
  const s = String(timeStr);
  if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}/.test(s)) {
    return { y: +s.slice(0,4), m: +s.slice(5,7), d: +s.slice(8,10), h: +s.slice(11,13) };
  }
  const ms = Date.parse(s);
  if (isNaN(ms)) return kstNow();
  const d = new Date(ms + 9 * 3600 * 1000);
  return { y: d.getUTCFullYear(), m: d.getUTCMonth()+1, d: d.getUTCDate(), h: d.getUTCHours() };
}

function setProdTimeInputs(kst) {
  document.getElementById('ptY').value = kst.y;
  document.getElementById('ptM').value = kst.m;
  document.getElementById('ptD').value = kst.d;
  document.getElementById('ptH').value = kst.h;
}

function getProdTimeStr() {
  const y = parseInt(document.getElementById('ptY').value);
  const m = parseInt(document.getElementById('ptM').value);
  const d = parseInt(document.getElementById('ptD').value);
  const h = parseInt(document.getElementById('ptH').value) || 0;
  return buildKstStr(y, m, d, h);
}

const WASTE_FACTOR = 1.1; // 재료 손실 10%

function recipeCost(recipe) {
  const raw = recipe.ingredients.reduce((sum, ri) => {
    const ing = getIngr(ri.id);
    return sum + (ing ? ing.price * ri.qty : 0);
  }, 0);
  return raw * WASTE_FACTOR;
}

function batchVolume(recipe) {
  return recipe.ingredients.reduce((sum, ri) => {
    const ing = getIngr(ri.id);
    return sum + (ing && ing.unit === 'g' ? ri.qty : 0);
  }, 0);
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════════════
// 생산량 추이 차트
// ═══════════════════════════════════════════════════════════
function parseDateOnly(timeStr) {
  const s = String(timeStr || '');
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return new Date(s.slice(0, 10));
  const ms = Date.parse(s);
  if (!isNaN(ms)) {
    const d = new Date(ms + 9 * 3600 * 1000);
    return new Date(`${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}-${pad2(d.getUTCDate())}`);
  }
  return null;
}

function getPeriodLabel(timeStr) {
  const d = parseDateOnly(timeStr);
  if (!d) return null;
  if (prodTrendPeriod === 'month') {
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
  }
  const weekNum = Math.ceil(d.getDate() / 7);
  return `${d.getMonth()+1}월${weekNum}주`;
}

function renderFlavorFilter() {
  const container = document.getElementById('prodTrendFlavorFilter');
  if (!container) return;
  const allFlavors = [...new Set(prodRawData.map(r => String(r['옵션']||'')).filter(Boolean))];
  if (!prodTrendFlavorFilter) {
    prodTrendFlavorFilter = new Set(allFlavors);
  }
  container.innerHTML = allFlavors.map(f => {
    const opt = META.options.find(o => o.name === f);
    const color = opt ? opt.color : '#5794f2';
    const checked = prodTrendFlavorFilter.has(f) ? 'checked' : '';
    return `<label style="display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none">
      <input type="checkbox" ${checked} onchange="toggleFlavorFilter('${f}',this.checked)" style="accent-color:${color}">
      <span class="option-dot" style="background:${color}"></span>
      <span style="font-size:12px">${f}</span>
    </label>`;
  }).join('');
}

function toggleFlavorFilter(flavor, checked) {
  if (!prodTrendFlavorFilter) prodTrendFlavorFilter = new Set();
  if (checked) prodTrendFlavorFilter.add(flavor);
  else prodTrendFlavorFilter.delete(flavor);
  renderProdTrendChart();
}

function setProdTrendPeriod(p) {
  prodTrendPeriod = p;
  document.querySelectorAll('.trend-period-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.period === p);
  });
  renderProdTrendChart();
}

function renderProdTrendChart() {
  const START = new Date('2026-03-01');
  const periodMap = {};

  prodRawData.forEach(r => {
    const d = parseDateOnly(String(r['생산시각']||''));
    if (!d || d < START) return;
    const optName = String(r['옵션']||'');
    if (!optName) return;
    const label = getPeriodLabel(String(r['생산시각']||''));
    if (!label) return;

    const opt    = META.options.find(o => o.name === optName);
    const recipe = opt ? META.recipes.find(rc => rc.optionId === opt.id && rc.name === String(r['레시피']||'')) : null;
    const vol    = recipe ? batchVolume(recipe) * (parseInt(r['배치수'])||1) : 0;

    if (!periodMap[label]) periodMap[label] = {};
    periodMap[label][optName] = (periodMap[label][optName] || 0) + vol;
  });

  const periods = Object.keys(periodMap).sort((a, b) => {
    if (prodTrendPeriod === 'week') {
      const pa = a.match(/(\d+)월(\d+)주/), pb = b.match(/(\d+)월(\d+)주/);
      if (pa && pb) return (parseInt(pa[1])*10+parseInt(pa[2])) - (parseInt(pb[1])*10+parseInt(pb[2]));
    }
    return a.localeCompare(b);
  });

  const allFlavors = [...new Set(prodRawData.map(r => String(r['옵션']||'')).filter(Boolean))];
  const flavors    = allFlavors.filter(f => prodTrendFlavorFilter && prodTrendFlavorFilter.has(f));

  const datasets = flavors.map(f => {
    const opt = META.options.find(o => o.name === f);
    return {
      label: f,
      data: periods.map(p => (periodMap[p]&&periodMap[p][f]) || 0),
      backgroundColor: opt ? opt.color : '#5794f2',
      borderWidth: 0,
      stack: 'stack'
    };
  });

  if (chartProdTrend) chartProdTrend.destroy();
  const canvas = document.getElementById('chartProdTrend');
  if (!canvas) return;

  chartProdTrend = new Chart(canvas, {
    type: 'bar',
    data: { labels: periods, datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color:'#d8d9da', font:{ size:11 } } },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}g` } }
      },
      scales: {
        x: { stacked:true, ticks:{ color:'#8e9196' }, grid:{ color:'#2c2f35' } },
        y: { stacked:true, ticks:{ color:'#8e9196', callback: v => v>=1000?(v/1000).toFixed(1)+'kg':v+'g' }, grid:{ color:'#2c2f35' } }
      }
    }
  });
}

function renderProdOptions() {
  const grid = document.getElementById('prodOptionGrid');
  grid.innerHTML = '';
  META.options.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'option-card' + (opt.id === selOptionId ? ' selected' : '');
    div.innerHTML = `<span class="option-dot" style="background:${opt.color}"></span><span class="option-name">${opt.name}</span>`;
    div.onclick = () => selectProdOption(opt.id);
    grid.appendChild(div);
  });
  renderProdStep2();
}

function selectProdOption(id) {
  selOptionId = id;
  selRecipeId = null;
  renderProdOptions();
}

function renderProdStep2() {
  const step2 = document.getElementById('prodStep2');
  const step3 = document.getElementById('prodStep3');
  if (!selOptionId) { step2.style.display = 'none'; step3.style.display = 'none'; return; }

  const recipes = META.recipes.filter(r => r.optionId === selOptionId);
  if (!recipes.length) { step2.style.display = 'none'; step3.style.display = 'none'; return; }

  step2.style.display = 'block';
  const list = document.getElementById('prodRecipeList');
  list.innerHTML = '';
  recipes.forEach(recipe => {
    const cost   = recipeCost(recipe);
    const vol    = batchVolume(recipe);
    const per120 = vol ? Math.round(cost / vol * 120) : 0;
    const div    = document.createElement('div');
    div.className = 'recipe-item' + (recipe.id === selRecipeId ? ' selected' : '');
    div.innerHTML = `
      <div>
        <div>${recipe.name}</div>
        <div class="recipe-meta">배치 용량 ${vol.toLocaleString()}g &nbsp;·&nbsp; 배치원가 ${fmt(cost)} &nbsp;·&nbsp; 120g당 ${per120}원</div>
      </div>
      <span style="color:var(--muted);font-size:18px">›</span>`;
    div.onclick = () => selectProdRecipe(recipe.id);
    list.appendChild(div);
  });
  renderProdStep3();
}

function selectProdRecipe(id) {
  selRecipeId = id;
  renderProdStep2();
}

function renderProdStep3() {
  const step3 = document.getElementById('prodStep3');
  if (!selRecipeId) { step3.style.display = 'none'; return; }
  step3.style.display = 'block';

  const recipe = getRecipe(selRecipeId);
  if (!recipe) return;

  document.getElementById('prodIngPreview').innerHTML =
    recipe.ingredients.map(ri => {
      const ing = getIngr(ri.id);
      return `<span class="ing-tag">${ing ? ing.name : ri.id} ${ri.qty}${ing ? ing.unit : ''}</span>`;
    }).join('');

  // 생산 일시 기본값: 최초 표시 시에만 현재 KST 시각으로 설정
  if (!document.getElementById('ptY').value) {
    setProdTimeInputs(kstNow());
  }

  updateCostPreview();
  document.getElementById('prodBatchInput').oninput = updateCostPreview;
}

function updateCostPreview() {
  const recipe = getRecipe(selRecipeId);
  if (!recipe) return;
  const batches = parseInt(document.getElementById('prodBatchInput').value) || 1;
  const total   = recipeCost(recipe) * batches;
  const totalG  = batchVolume(recipe) * batches;
  document.getElementById('prodCostPreview').innerHTML =
    `총 생산량 <span class="cost-highlight">${totalG.toLocaleString()}g</span> &nbsp;·&nbsp; 예상 원가 <span class="cost-highlight">${fmt(total)}</span>`;
}

async function submitProduction() {
  const recipe  = getRecipe(selRecipeId);
  const opt     = getOpt(selOptionId);
  const batches = parseInt(document.getElementById('prodBatchInput').value) || 1;
  if (!recipe || !opt) return;

  const btn = document.getElementById('prodSubmitBtn');
  btn.disabled = true;
  btn.textContent = '저장 중…';

  const timeISO = getProdTimeStr();

  const params = new URLSearchParams({
    action: 'addProduction',
    time:    timeISO,
    option:  opt.name,
    recipe:  recipe.name,
    batches
  });

  try {
    await fetch(API + '?' + params.toString());
    showToast(`등록 완료: ${opt.name} - ${recipe.name} × ${batches}배치`);
    selOptionId = null; selRecipeId = null;
    document.getElementById('prodBatchInput').value = 1;
    document.getElementById('ptY').value = '';
    document.getElementById('ptM').value = '';
    document.getElementById('ptD').value = '';
    document.getElementById('ptH').value = '';
    renderProdOptions();
    loadProdHistory();
  } catch(e) {
    showToast('저장 실패. 다시 시도해주세요.');
  }

  btn.disabled = false;
  btn.textContent = '생산 등록';
}

const _phTimers = {};

function _phRecipeOpts(optName, selRecipe) {
  const opt = META.options.find(o => o.name === optName);
  const recipes = opt ? META.recipes.filter(r => r.optionId === opt.id) : [];
  return recipes.map(r =>
    `<option value="${r.name}" ${r.name === selRecipe ? 'selected' : ''}>${r.name}</option>`
  ).join('');
}

function _phRow(r) {
  const kst     = parseKST(String(r['생산시각'] || ''));
  const row     = r._row || '';
  const curOpt  = String(r['옵션']    || '');
  const curRec  = String(r['레시피']  || '');
  const ni = (f, v, w, mn, mx) =>
    `<input class="ph-inp" data-field="${f}" type="number" value="${v}"
      min="${mn}" max="${mx}" style="width:${w}" onchange="scheduleProdSave('${row}')">`;

  const optOpts = META.options.map(o =>
    `<option value="${o.name}" ${o.name === curOpt ? 'selected' : ''}>${o.name}</option>`
  ).join('');

  return `
  <tr data-row="${row}">
    <td style="white-space:nowrap">
      <div style="display:flex;align-items:center;gap:2px">
        ${ni('y', kst.y, '46px', 2020, 2099)}
        <span class="ph-sep">/</span>
        ${ni('m', kst.m, '26px', 1, 12)}
        <span class="ph-sep">/</span>
        ${ni('d', kst.d, '26px', 1, 31)}
        <span style="display:inline-block;width:6px"></span>
        ${ni('h', kst.h, '26px', 0, 23)}
        <span class="ph-sep">시</span>
      </div>
    </td>
    <td>
      <select class="ph-inp" data-field="option" style="max-width:90px"
        onchange="onPhOptChange(this,'${row}')">
        ${optOpts}
      </select>
    </td>
    <td>
      <select class="ph-inp" data-field="recipe" id="phRec-${row}" style="max-width:110px"
        onchange="scheduleProdSave('${row}')">
        ${_phRecipeOpts(curOpt, curRec)}
      </select>
    </td>
    <td style="text-align:center">
      ${ni('batches', r['배치수'] || 1, '36px', 1, 99)}
    </td>
    <td>
      <button class="btn btn-danger btn-sm" onclick="deleteProdRow(${row})">✕</button>
    </td>
  </tr>`;
}

async function loadProdHistory() {
  const el = document.getElementById('prodHistory');
  try {
    const res  = await fetch(API + '?action=getProduction');
    const json = await res.json();
    prodRawData = json.data || [];
    renderFlavorFilter();
    renderProdTrendChart();
    let data   = prodRawData.slice();

    // 생산시각 내림차순 정렬
    data.sort((a, b) => String(b['생산시각'] || '').localeCompare(String(a['생산시각'] || '')));
    data = data.slice(0, 30);

    if (!data.length) { el.innerHTML = '<div class="empty">생산 이력이 없습니다.</div>'; return; }

    el.innerHTML = `
      <table>
        <thead><tr>
          <th>생산시각</th>
          <th>맛</th>
          <th>레시피</th>
          <th style="text-align:center">배치</th>
          <th></th>
        </tr></thead>
        <tbody>${data.map(_phRow).join('')}</tbody>
      </table>`;
  } catch(e) {
    el.innerHTML = '<div class="empty">이력 로드 실패</div>';
  }
}

function onPhOptChange(sel, row) {
  const recSel = document.getElementById('phRec-' + row);
  if (recSel) recSel.innerHTML = _phRecipeOpts(sel.value, '');
  scheduleProdSave(row);
}

function scheduleProdSave(row) {
  clearTimeout(_phTimers[row]);
  _phTimers[row] = setTimeout(() => saveProdRow(row), 600);
}

async function saveProdRow(row) {
  const tr  = document.querySelector(`tr[data-row="${row}"]`);
  if (!tr) return;
  const get = f => tr.querySelector(`[data-field="${f}"]`)?.value;
  const y = parseInt(get('y')), m = parseInt(get('m')), d = parseInt(get('d')), h = parseInt(get('h')) || 0;
  if (!y || !m || !d) return;
  try {
    await fetch(API + '?' + new URLSearchParams({
      action:  'updateProduction',
      row,
      time:    buildKstStr(y, m, d, h),
      option:  get('option')  || '',
      recipe:  get('recipe')  || '',
      batches: get('batches') || 1
    }));
    showToast('저장됨');
  } catch(e) { showToast('저장 실패'); }
}

async function deleteProdRow(row) {
  if (!confirm('이 생산 기록을 삭제하시겠습니까?')) return;
  try {
    await fetch(API + '?' + new URLSearchParams({ action: 'deleteProduction', row }));
    showToast('삭제됨');
    loadProdHistory();
  } catch(e) {
    showToast('삭제 실패');
  }
}

function renderRecipeCard(recipe) {
  const cost   = recipeCost(recipe);
  const vol    = batchVolume(recipe);
  const per120 = vol ? Math.round(cost / vol * 120) : 0;

  const ingOptions = META.ingredients.map(ing =>
    `<option value="${ing.id}">${ing.name} (${ing.unit})</option>`
  ).join('');

  const ingRows = recipe.ingredients.map((ri, idx) => {
    const selOptions = META.ingredients.map(ing =>
      `<option value="${ing.id}" ${ing.id === ri.id ? 'selected' : ''}>${ing.name} (${ing.unit})</option>`
    ).join('');
    return `
      <div class="ing-row">
        <select class="ing-select" onchange="updateIngredient('${recipe.id}',${idx},'id',this.value)">${selOptions}</select>
        <input class="ing-qty" type="number" value="${ri.qty}" min="0" step="any"
          onchange="updateIngredient('${recipe.id}',${idx},'qty',this.value)">
        <span style="color:var(--muted);font-size:12px">${getIngr(ri.id)?.unit || ''}</span>
        <button class="btn btn-ghost btn-sm" onclick="removeIngredient('${recipe.id}',${idx})">✕</button>
      </div>`;
  }).join('');

  return `
    <div class="recipe-row" id="rcard-${recipe.id}">
      <div class="recipe-header">
        <div>
          <input class="recipe-name-input" value="${recipe.name}"
            onchange="updateRecipeName('${recipe.id}',this.value)">
          <div style="font-size:11px;color:var(--muted);margin-top:4px">
            배치 용량: <span id="rvol-${recipe.id}">${vol.toLocaleString()}</span>g
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="openCopyModal('${recipe.id}')">복사</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRecipe('${recipe.id}')">삭제</button>
        </div>
      </div>
      ${ingRows}
      <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="addIngredientToRecipe('${recipe.id}')">+ 재료 추가</button>
      <div class="recipe-cost" id="rcost-${recipe.id}">
        배치 원가: <strong style="color:var(--green)">${fmt(cost)}</strong>
        &nbsp;·&nbsp; 120g당: <strong style="color:var(--accent)">${per120}원</strong>
        <span style="color:var(--muted);margin-left:4px">(재료비 × 1.1 손실 포함)</span>
      </div>
    </div>`;
}

function updateOptionName(val) {
  const opt = getOpt(editingOptionId);
  if (opt) { opt.name = val; persistMeta(); renderOptionSidebar(); }
}
function updateOptionColor(val) {
  const opt = getOpt(editingOptionId);
  if (opt) { opt.color = val; persistMeta(); renderOptionSidebar(); }
}
function addOption() {
  const name = prompt('새 맛 이름:');
  if (!name) return;
  const o = { id: 'o' + uid(), name, color: '#5794f2' };
  META.options.push(o);
  editingOptionId = o.id;
  persistMeta(); renderRecipeTab();
}
function deleteOption(id) {
  if (!confirm('이 맛과 연결된 레시피도 모두 삭제됩니다. 계속하시겠습니까?')) return;
  META.options = META.options.filter(o => o.id !== id);
  META.recipes = META.recipes.filter(r => r.optionId !== id);
  if (editingOptionId === id) editingOptionId = META.options[0]?.id || null;
  persistMeta(); renderRecipeTab();
}
function addRecipe(optionId) {
  const r = { id: 'r' + uid(), optionId, name: '새 레시피', ingredients: [] };
  META.recipes.push(r);
  persistMeta(); renderRecipeEditor();
}
function deleteRecipe(id) {
  if (!confirm('레시피를 삭제하시겠습니까?')) return;
  META.recipes = META.recipes.filter(r => r.id !== id);
  persistMeta(); renderRecipeEditor();
}

let copyingRecipeId = null;
function openCopyModal(recipeId) {
  copyingRecipeId = recipeId;
  const sel = document.getElementById('copyTargetSelect');
  sel.innerHTML = META.options.map(o =>
    `<option value="${o.id}">${o.name}</option>`
  ).join('');
  // 기본 선택: 현재 맛 이외 첫 번째, 없으면 현재 맛
  const src = getRecipe(recipeId);
  const other = META.options.find(o => o.id !== (src && src.optionId));
  if (other) sel.value = other.id;
  document.getElementById('copyModal').classList.add('show');
}
function closeCopyModal() {
  document.getElementById('copyModal').classList.remove('show');
  copyingRecipeId = null;
}
function confirmCopy() {
  const src = getRecipe(copyingRecipeId);
  if (!src) { closeCopyModal(); return; }
  const targetId = document.getElementById('copyTargetSelect').value;
  const target   = META.options.find(o => o.id === targetId);
  if (!target) { closeCopyModal(); return; }

  const newRecipe = {
    id: 'r' + uid(),
    optionId: targetId,
    name: src.name + ' (복사본)',
    ingredients: JSON.parse(JSON.stringify(src.ingredients))
  };
  META.recipes.push(newRecipe);
  persistMeta();
  closeCopyModal();

  // 복사 대상 맛으로 이동
  editingOptionId = targetId;
  renderRecipeTab();
  showToast(`"${src.name}"을 ${target.name}으로 복사했습니다.`);
}
function updateRecipeName(id, val) {
  const r = getRecipe(id);
  if (r) { r.name = val; persistMeta(); refreshRecipeCost(id); }
}
function updateIngredient(recipeId, idx, field, val) {
  const r = getRecipe(recipeId);
  if (!r) return;
  if (field === 'qty') r.ingredients[idx].qty = parseFloat(val) || 0;
  if (field === 'id')  r.ingredients[idx].id  = val;
  persistMeta(); refreshRecipeCost(recipeId);
}
function addIngredientToRecipe(recipeId) {
  const r   = getRecipe(recipeId);
  const ing = META.ingredients[0];
  if (!r || !ing) return;
  r.ingredients.push({ id: ing.id, qty: 0 });
  persistMeta(); renderRecipeEditor();
}
function removeIngredient(recipeId, idx) {
  const r = getRecipe(recipeId);
  if (!r) return;
  r.ingredients.splice(idx, 1);
  persistMeta(); renderRecipeEditor();
}
function refreshRecipeCost(recipeId) {
  const r    = getRecipe(recipeId);
  if (!r) return;
  const cost   = recipeCost(r);
  const vol    = batchVolume(r);
  const per120 = vol ? Math.round(cost / vol * 120) : 0;
  const el     = document.getElementById('rcost-' + recipeId);
  if (el) el.innerHTML =
    `배치 원가: <strong style="color:var(--green)">${fmt(cost)}</strong> &nbsp;·&nbsp; 120g당: <strong style="color:var(--accent)">${per120}원</strong> <span style="color:var(--muted)">(재료비 × 1.1 손실 포함)</span>`;
  const velEl  = document.getElementById('rvol-' + recipeId);
  if (velEl) velEl.textContent = vol.toLocaleString();
}

// ═══════════════════════════════════════════════════════════
// 탭 4: 재료 관리
// ═══════════════════════════════════════════════════════════
function renderIngrTable() {
  document.getElementById('ingrTableBody').innerHTML =
    META.ingredients.map((ing, idx) => {
      const url = ing.url || '';
      const linkIcon = url
        ? `<a href="${url}" target="_blank" rel="noopener" class="url-link" title="${url}">🔗 링크</a>`
        : '';
      return `
        <tr>
          <td><input class="cell-input" value="${ing.name}"
            onchange="META.ingredients[${idx}].name=this.value;persistMeta()"></td>
          <td><input class="cell-input" value="${ing.unit}" style="width:60px"
            onchange="META.ingredients[${idx}].unit=this.value;persistMeta()"></td>
          <td><input class="cell-input" type="number" value="${ing.price}" step="any" min="0" style="width:120px"
                onchange="META.ingredients[${idx}].price=parseFloat(this.value)||0;persistMeta()"></td>
          <td style="min-width:220px">
            <div style="display:flex;align-items:center;gap:6px">
              <input class="cell-input" type="url" value="${url}" placeholder="https://…"
                onchange="META.ingredients[${idx}].url=this.value;persistMeta();renderIngrTable()"
                style="flex:1;font-size:12px">
              ${linkIcon}
            </div>
          </td>
          <td><button class="btn btn-ghost btn-sm" onclick="deleteIngredient(${idx})">✕</button></td>
        </tr>`;
    }).join('');
}

function addIngredient() {
  META.ingredients.push({ id: 'i' + uid(), name: '새 재료', unit: 'g', price: 0, url: '' });
  persistMeta();
  renderIngrTable();
}
function deleteIngredient(idx) {
  if (!confirm(`"${META.ingredients[idx].name}" 재료를 삭제할까요?`)) return;
  const id = META.ingredients[idx].id;
  META.ingredients.splice(idx, 1);
  META.recipes.forEach(r => { r.ingredients = r.ingredients.filter(ri => ri.id !== id); });
  persistMeta();
  renderIngrTable();
}

// ═══════════════════════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════════════════════
async function init() {
  // 초기 탭: URL 해시 우선, 없으면 생산 관리
  const initHash = location.hash.slice(1);
  const startTab = TAB_IDX.hasOwnProperty(initHash) ? initHash : 'prod';
  switchTab(startTab);

  // API에서 최신 메타 로드 후 재렌더
  const updated = await loadMetaFromAPI();
  if (updated) {
    renderProdOptions();
    if (document.getElementById('tab-recipe').classList.contains('active')) renderRecipeTab();
    if (document.getElementById('tab-ingr').classList.contains('active'))   renderIngrTable();
  }
}

init();
</script>
</body>
</html>
