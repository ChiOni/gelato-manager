<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>젤라또 매니저</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════
   Design Tokens — Toss-inspired Light Theme
════════════════════════════════════════════════════════ */
:root {
  --bg:        #F8FAFC;
  --surface:   #FFFFFF;
  --panel:     #FFFFFF;
  --border:    #E2E8F0;
  --border-2:  #CBD5E1;
  --text:      #0F172A;
  --muted:     #64748B;
  --accent:    #3B82F6;
  --accent-bg: #EFF6FF;
  --accent-2:  #2563EB;
  --green:     #10B981;
  --green-bg:  #ECFDF5;
  --red:       #EF4444;
  --red-bg:    #FEF2F2;
  --yellow:    #F59E0B;
  --orange:    #F97316;
  --purple:    #8B5CF6;
  --inp:       #F1F5F9;
  --sh-xs:     0 1px 2px rgba(0,0,0,.05);
  --sh-sm:     0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --sh-md:     0 4px 16px rgba(0,0,0,.08);
  --r:         10px;
  --r-sm:      7px;
}

/* ════ Reset ════════════════════════════════════════════ */
*  { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'PretendardVariable', 'Pretendard', -apple-system, BlinkMacSystemFont,
               'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.01em;
}

/* ════ Navigation ═══════════════════════════════════════ */
.nav {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 48px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--sh-xs);
}
.nav-btn {
  background: none; border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 16px 20px;
  font-size: 15px; font-weight: 500;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .15s;
}
.nav-btn:hover  { color: var(--text); }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* ════ Layout ═══════════════════════════════════════════ */
.tab        { display: none; padding: 32px 48px; max-width: 1600px; margin: 0 auto; }
.tab.active { display: block; }

/* ════ Card ═════════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--sh-xs);
}
.card-title {
  font-size: 12px; font-weight: 700;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 16px;
}

/* ════ Segmented Control ════════════════════════════════ */
.seg-ctrl { display:flex; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:3px; }
.seg-btn  { background:none; border:none; padding:6px 20px; border-radius:6px; font-size:14px; font-weight:500; color:var(--muted); cursor:pointer; transition:all .2s; }
.seg-btn.active { background:var(--surface); color:var(--accent); font-weight:600; box-shadow:0 1px 3px rgba(0,0,0,.1); }

/* ════ Flavor Filter Dropdown ═══════════════════════════ */
.filter-wrap { position:relative; }
.filter-btn  { display:flex; align-items:center; gap:5px; background:var(--surface); border:1px solid var(--border-2); border-radius:var(--r-sm); padding:6px 12px; font-size:14px; font-weight:500; color:var(--text); cursor:pointer; transition:all .15s; white-space:nowrap; }
.filter-btn:hover { border-color:var(--accent); color:var(--accent); }
.filter-panel { position:absolute; top:calc(100% + 6px); right:0; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--sh-md); min-width:180px; z-index:200; overflow:hidden; }
.filter-panel-hdr { padding:10px 14px 8px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.filter-all-btn { font-size:11px; color:var(--accent); background:none; border:none; cursor:pointer; font-weight:600; }
.filter-item { display:flex; align-items:center; gap:8px; padding:9px 14px; cursor:pointer; transition:background .1s; font-size:14px; }
.filter-item:hover { background:var(--bg); }

/* ════ Production Steps ═════════════════════════════════ */
.step-label {
  font-size: 12px; font-weight: 700;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 12px;
}
.step-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px 24px;
  margin-bottom: 12px;
  box-shadow: var(--sh-xs);
}
.option-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 10px; margin-bottom: 4px;
}
.option-card {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px 16px;
  cursor: pointer; transition: all .15s;
  text-align: center; font-size: 14px;
}
.option-card:hover   { border-color: var(--accent); background: var(--accent-bg); }
.option-card.selected { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
.option-dot  { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
.option-name { font-weight: 600; }

.recipe-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
.recipe-item {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px 18px;
  cursor: pointer; display: flex;
  justify-content: space-between; align-items: center;
  transition: all .15s;
}
.recipe-item:hover    { border-color: var(--accent); background: var(--accent-bg); }
.recipe-item.selected { border-color: var(--accent); background: var(--accent-bg); }
.recipe-meta { font-size: 13px; color: var(--muted); margin-top: 3px; }

.ingredient-preview { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.ing-tag {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 5px; padding: 4px 10px;
  font-size: 12px; color: var(--muted); font-weight: 500;
}
.batch-row  { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
.batch-input {
  background: var(--inp); border: 1.5px solid var(--border);
  color: var(--text); border-radius: var(--r-sm);
  padding: 10px 14px; font-size: 22px; font-weight: 700;
  width: 100px; text-align: center; transition: border-color .15s;
}
.batch-input:focus { outline: none; border-color: var(--accent); background: #fff; }
.cost-preview    { font-size: 13px; color: var(--muted); margin-top: 8px; }
.cost-highlight  { color: var(--green); font-weight: 700; }

/* ════ Buttons ══════════════════════════════════════════ */
.btn {
  border: none; border-radius: var(--r-sm);
  padding: 9px 18px; cursor: pointer;
  font-size: 14px; font-weight: 600;
  transition: all .15s; letter-spacing: -.01em;
  white-space: nowrap;
}
.btn-primary          { background: var(--accent); color: #fff; }
.btn-primary:hover    { background: var(--accent-2); }
.btn-primary:disabled { opacity: .4; cursor: default; }
.btn-ghost            { background: transparent; border: 1px solid var(--border-2); color: var(--muted); }
.btn-ghost:hover      { border-color: var(--text); color: var(--text); background: var(--bg); }
.btn-danger           { background: var(--red); color: #fff; }
.btn-danger:hover     { opacity: .88; }
.btn-sm               { padding: 5px 12px; font-size: 13px; border-radius: 6px; }

/* ════ Recipe Management ════════════════════════════════ */
.mgmt-layout { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }
@media (max-width: 900px) { .mgmt-layout { grid-template-columns: 1fr; } }
.option-sidebar { display: flex; flex-direction: column; gap: 4px; }
.sidebar-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 11px 14px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; font-weight: 500; transition: all .15s;
}
.sidebar-item:hover    { border-color: var(--accent); background: var(--accent-bg); }
.sidebar-item.selected { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
.sidebar-add {
  text-align: center; color: var(--muted);
  border: 1.5px dashed var(--border-2);
  border-radius: var(--r-sm); padding: 11px; cursor: pointer;
  font-size: 14px; font-weight: 500; transition: all .15s; margin-top: 4px;
}
.sidebar-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

.recipe-editor { display: flex; flex-direction: column; gap: 12px; }
.recipe-row {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 20px 24px; box-shadow: var(--sh-xs);
}
.recipe-header      { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.recipe-name-input  {
  background: transparent; border: none;
  border-bottom: 1.5px solid var(--border);
  color: var(--text); padding: 4px 2px 4px 0;
  font-size: 15px; font-weight: 700; width: 240px; transition: border-color .15s;
}
.recipe-name-input:focus { outline: none; border-bottom-color: var(--accent); }
.yield-input { background: var(--inp); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; width: 90px; }

/* ── 이력 인라인 편집 (클릭 시 편집) ──────────────── */
.ph-inp {
  background: transparent; border: 1px solid transparent;
  color: var(--text); border-radius: 5px;
  padding: 4px 6px; font-size: 14px; text-align: center;
  transition: all .15s; font-family: inherit; cursor: default;
}
.ph-inp:hover  { border-color: var(--border); background: var(--inp); cursor: text; }
.ph-inp:focus  { outline: none; border-color: var(--accent); background: #fff; cursor: text; }
.ph-sep        { color: var(--border-2); font-size: 11px; user-select: none; }
#prodHistory   { overflow-x: auto; }
#prodHistory table td  { padding: 11px 14px; }
#prodHistory table th  { padding: 10px 14px; }
#prodHistory select.ph-inp { text-align: left; cursor: pointer; }

.ing-row   { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.ing-select { background: var(--inp); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 8px; min-width: 150px; font-size: 14px; }
.ing-qty    { background: var(--inp); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 8px; width: 80px; }
.recipe-cost { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 13px; color: var(--muted); }

/* ════ Table ════════════════════════════════════════════ */
table { width: 100%; border-collapse: collapse; }
th {
  background: var(--bg); color: var(--muted);
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  padding: 11px 16px; text-align: left; border-bottom: 1px solid var(--border);
}
td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 14px; }
tr:last-child td { border-bottom: none; }
tr:hover td      { background: var(--bg); }
.cell-input { background: transparent; border: none; color: var(--text); width: 100%; font-size: 14px; padding: 2px 0; }
.cell-input:focus { outline: 1.5px solid var(--accent); border-radius: 4px; background: var(--accent-bg); padding: 2px 6px; }

/* ════ Misc ═════════════════════════════════════════════ */
.row-btns { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.toast {
  position: fixed; bottom: 32px; right: 32px;
  background: var(--text); color: #fff;
  padding: 12px 20px; border-radius: var(--r-sm);
  z-index: 9999; opacity: 0;
  transform: translateY(8px);
  transition: opacity .2s, transform .2s;
  font-size: 14px; font-weight: 500;
  box-shadow: var(--sh-md); pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.empty      { color: var(--muted); text-align: center; padding: 48px; font-size: 14px; }
.section-hdr    { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.section-hdr h3 { font-size: 15px; font-weight: 700; }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
.url-link       { color: var(--accent); text-decoration: none; font-size: 12px; font-weight: 500; }
.url-link:hover { text-decoration: underline; }
select, input   { font-family: inherit; }

/* ════ Modal ════════════════════════════════════════════ */
.modal-overlay      { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.22); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
.modal-overlay.show { display: flex; }
.modal-box          { background: var(--surface); border-radius: 16px; padding: 28px; min-width: 300px; box-shadow: 0 20px 60px rgba(0,0,0,.14); }
.modal-box h4       { margin-bottom: 16px; font-size: 16px; font-weight: 700; }
.modal-select       { width: 100%; background: var(--inp); border: 1.5px solid var(--border); color: var(--text); border-radius: var(--r-sm); padding: 10px 12px; font-size: 14px; margin-bottom: 16px; }
.modal-btns         { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<!-- ── 네비 ──────────────────────────────────────── -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('prod')">생산 관리</button>
  <button class="nav-btn" onclick="switchTab('recipe')">레시피 관리</button>
  <button class="nav-btn" onclick="switchTab('ingr')">재료 관리</button>
</nav>

<!-- ══════════════════════════════════════════════
     탭 1: 생산 관리
════════════════════════════════════════════════ -->
<div id="tab-prod" class="tab active">

  <!-- 주별/월별 생산량 추이 차트 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="card-title" style="margin-bottom:0">주별 생산량 추이</div>
      <div style="display:flex;align-items:center;gap:10px">
        <!-- 맛 필터 드롭다운 -->
        <div class="filter-wrap" id="flavorFilterWrap">
          <button class="filter-btn" onclick="toggleFlavorDropdown(event)">
            <span id="flavorFilterLabel">전체 맛</span>
            <span style="font-size:10px;opacity:.6">▾</span>
          </button>
          <div class="filter-panel" id="flavorFilterPanel" style="display:none">
            <div class="filter-panel-hdr">
              <span style="font-size:12px;font-weight:600;color:var(--muted)">맛 필터</span>
              <button class="filter-all-btn" onclick="selectAllFlavors(event)">전체 선택</button>
            </div>
            <div id="flavorCheckboxList"></div>
          </div>
        </div>
        <!-- 주간/월간 세그먼트 -->
        <div class="seg-ctrl">
          <button class="seg-btn active" data-period="week" onclick="setProdTrendPeriod('week')">주간</button>
          <button class="seg-btn" data-period="month" onclick="setProdTrendPeriod('month')">월간</button>
        </div>
      </div>
    </div>
    <canvas id="chartProdTrend" height="160"></canvas>
  </div>

  <!-- 생산 이력 -->
  <div class="card">
    <div class="section-hdr">
      <h3>생산 이력</h3>
      <button class="btn btn-primary btn-sm" onclick="openAddProdModal()">+ 생산 등록</button>
    </div>
    <div id="prodHistory"><div class="empty">로드 중…</div></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     탭 3: 레시피 관리
════════════════════════════════════════════════ -->
<div id="tab-recipe" class="tab">
  <div class="mgmt-layout">
    <!-- 좌: 옵션 사이드바 -->
    <div>
      <div class="section-hdr">
        <h3>맛</h3>
        <button class="btn btn-ghost btn-sm" onclick="addOption()">+ 추가</button>
      </div>
      <div class="option-sidebar" id="optionSidebar"></div>
    </div>
    <!-- 우: 레시피 에디터 -->
    <div id="recipeEditorWrap">
      <div class="empty">좌측에서 옵션을 선택하세요.</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     탭 4: 재료 관리
════════════════════════════════════════════════ -->
<div id="tab-ingr" class="tab">
  <div class="card">
    <div class="section-hdr">
      <h3>재료 목록</h3>
      <button class="btn btn-ghost btn-sm" onclick="addIngredient()">+ 재료 추가</button>
    </div>
    <table>
      <thead><tr><th>이름</th><th>단위</th><th>단가 (원/단위)</th><th>구매처 링크</th><th></th></tr></thead>
      <tbody id="ingrTableBody"></tbody>
    </table>
  </div>
  <!-- 재료 변경은 onchange에서 자동 저장됩니다 -->
</div>

<!-- 생산 등록 모달 -->
<div class="modal-overlay" id="addProdModal">
  <div class="modal-box" style="width:520px;max-width:95vw">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h4>생산 등록</h4>
      <button class="btn btn-ghost btn-sm" onclick="closeAddProdModal()">✕</button>
    </div>

    <!-- 맛 선택 -->
    <div style="margin-bottom:16px">
      <div class="step-label">맛 선택</div>
      <div class="option-grid" id="prodOptionGrid"></div>
    </div>

    <!-- 레시피 선택 -->
    <div id="prodStep2" style="display:none;margin-bottom:16px">
      <div class="step-label">레시피 선택</div>
      <div class="recipe-list" id="prodRecipeList"></div>
    </div>

    <!-- 배치 + 일시 -->
    <div id="prodStep3" style="display:none">
      <div class="step-label">배치 수 & 생산 일시</div>
      <div id="prodIngPreview" class="ingredient-preview" style="margin-bottom:14px"></div>
      <div style="display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap">
        <div>
          <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px">배치 수</div>
          <input id="prodBatchInput" class="batch-input" type="number" min="1" value="1">
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px">생산 일시</div>
          <div style="display:flex;align-items:center;gap:4px">
            <input id="ptY" type="number" min="2020" max="2099" style="width:64px;background:var(--inp);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit">
            <span style="color:var(--muted);font-size:12px">년</span>
            <input id="ptM" type="number" min="1" max="12" style="width:44px;background:var(--inp);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit">
            <span style="color:var(--muted);font-size:12px">월</span>
            <input id="ptD" type="number" min="1" max="31" style="width:44px;background:var(--inp);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit">
            <span style="color:var(--muted);font-size:12px">일</span>
            <input id="ptH" type="number" min="0" max="23" style="width:44px;background:var(--inp);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit">
            <span style="color:var(--muted);font-size:12px">시</span>
          </div>
        </div>
      </div>
      <div id="prodCostPreview" class="cost-preview" style="margin-top:12px"></div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
        <button class="btn btn-ghost" onclick="closeAddProdModal()">취소</button>
        <button class="btn btn-primary" id="prodSubmitBtn" onclick="submitProduction()">등록</button>
      </div>
    </div>
  </div>
</div>

<!-- copy modal -->
<div class="modal-overlay" id="copyModal">
  <div class="modal-box">
    <h4>레시피 복사 — 어느 맛으로?</h4>
    <select class="modal-select" id="copyTargetSelect"></select>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeCopyModal()">취소</button>
      <button class="btn btn-primary" onclick="confirmCopy()">복사</button>
    </div>
  </div>

    if (raw) return JSON.parse(raw);

  return JSON.parse(JSON.stringify(DEFAULT_METADATA));
}

function saveMetaLocal(meta) {

async function loadMetaFromAPI() {

    const res = await fetch(API + '?action=getMetadata');
    const j   = await res.json();
    if (j.metadata) {
      META = JSON.parse(j.metadata);
      saveMetaLocal(META);

  return false;
}

function uid()      { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

// KST 유틸 ─────────────────────────────────────────────────
// 항상 KST(+09:00) 기준으로 처리
const pad2 = n => String(n).padStart(2, '0');

function kstNow() {
  // UTC ms → KST ms → 각 필드 추출 (getUTC* 사용)
  const d = new Date(Date.now() + 9 * 3600 * 1000);
  return { y: d.getUTCFullYear(), m: d.getUTCMonth() + 1, d: d.getUTCDate(), h: d.getUTCHours() };
}

// 저장할 시각 문자열: YYYY-MM-DDTHH:00:00+09:00
function buildKstStr(y, m, d, h) {
  return `${y}-${pad2(m)}-${pad2(d)}T${pad2(h)}:00:00+09:00`;
}

// 이력 표시용
// 새 형식 "YYYY-MM-DD HH:mm" → 이미 KST, 변환 없이 표시
// 구 형식 UTC ISO → +9h 변환
function fmtKST(timeStr) {
  if (!timeStr) return '';
  const s = String(timeStr);
  if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}/.test(s)) {
    return s.slice(0, 10) + ' ' + s.slice(11, 13) + '시';
  }
  const ms = Date.parse(s);
  if (isNaN(ms)) return s.slice(0, 13).replace('T', ' ') + '시';
  const d = new Date(ms + 9 * 3600 * 1000);
  return `${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}-${pad2(d.getUTCDate())} ${d.getUTCHours()}시`;
}

// 수정 UI용: KST 필드 추출
function parseKST(timeStr) {
  if (!timeStr) return kstNow();
  const s = String(timeStr);
  if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}/.test(s)) {
    return { y: +s.slice(0,4), m: +s.slice(5,7), d: +s.slice(8,10), h: +s.slice(11,13) };
  }
  const ms = Date.parse(s);
  if (isNaN(ms)) return kstNow();
  const d = new Date(ms + 9 * 3600 * 1000);
  return { y: d.getUTCFullYear(), m: d.getUTCMonth()+1, d: d.getUTCDate(), h: d.getUTCHours() };
}

function setProdTimeInputs(kst) {
  document.getElementById('ptY').value = kst.y;
  document.getElementById('ptM').value = kst.m;
  document.getElementById('ptD').value = kst.d;
  document.getElementById('ptH').value = kst.h;
}

function getProdTimeStr() {
  const y = parseInt(document.getElementById('ptY').value);
  const m = parseInt(document.getElementById('ptM').value);
  const d = parseInt(document.getElementById('ptD').value);
  const h = parseInt(document.getElementById('ptH').value) || 0;
  return buildKstStr(y, m, d, h);
}

const WASTE_FACTOR = 1.1; // 재료 손실 10%

function recipeCost(recipe) {
  const raw = recipe.ingredients.reduce((sum, ri) => {
    const ing = getIngr(ri.id);
    return sum + (ing ? ing.price * ri.qty : 0);
  }, 0);
  return raw * WASTE_FACTOR;
}

function batchVolume(recipe) {
  return recipe.ingredients.reduce((sum, ri) => {
    const ing = getIngr(ri.id);
    return sum + (ing && ing.unit === 'g' ? ri.qty : 0);
  }, 0);
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════════════
// 생산량 추이 차트
// ═══════════════════════════════════════════════════════════
function parseDateOnly(timeStr) {
  const s = String(timeStr || '');
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return new Date(s.slice(0, 10));
  const ms = Date.parse(s);
  if (!isNaN(ms)) {
    const d = new Date(ms + 9 * 3600 * 1000);
    return new Date(`${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}-${pad2(d.getUTCDate())}`);
  }
  return null;
}

function getPeriodLabel(timeStr) {
  const d = parseDateOnly(timeStr);
  if (!d) return null;
  if (prodTrendPeriod === 'month') {
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
  }
  const weekNum = Math.ceil(d.getDate() / 7);
  return `${d.getMonth()+1}월${weekNum}주`;
}

// 시트 저장 이름(구 이름 '바나나' 포함)으로 옵션/색상 찾기
function findOptBySheetName(flavorName) {
  let opt = META.options.find(o => o.name === flavorName);
  if (opt) return opt;
  const recipe = META.recipes.find(rc =>
    rc.name === flavorName || rc.name.startsWith(flavorName + ' ') || flavorName.startsWith(rc.name.split(' ')[0])
  );
  return recipe ? META.options.find(o => o.id === recipe.optionId) : null;
}

// 레코드에서 옵션명 추출 (구 컬럼명 '맛' 폴백 + 레시피 역추적)
function getFlavorFromRecord(r) {
  // 신버전: '옵션', 구버전: '맛' 컬럼명 폴백
  let name = String(r['옵션'] || r['맛'] || r['메뉴'] || '');
  if (name) return name;
  // 레시피 이름으로 역추적
  const recipeName = String(r['레시피'] || '');
  if (!recipeName) return '';
  const recipe = META.recipes.find(rc => rc.name === recipeName);
  if (!recipe) return recipeName; // 레시피 이름을 그대로 사용
  const opt = META.options.find(o => o.id === recipe.optionId);
  return opt ? opt.name : recipeName;
}

function renderFlavorFilter() {
  const container = document.getElementById('flavorCheckboxList');
  if (!container) return;
  const allFlavors = [...new Set(prodRawData.map(r => getFlavorFromRecord(r)).filter(Boolean))];
  if (!prodTrendFlavorFilter) prodTrendFlavorFilter = new Set(allFlavors);
  container.innerHTML = allFlavors.map(f => {
    const opt = findOptBySheetName(f);
    const color = opt ? opt.color : '#5794f2';
    const checked = prodTrendFlavorFilter.has(f);
    return `<div class="filter-item" onclick="toggleFlavorFilter('${f}',${!checked})">
      <input type="checkbox" ${checked ? 'checked' : ''} style="accent-color:${color};pointer-events:none">
      <span>${f}</span>
    </div>`;
  }).join('');
  updateFlavorFilterLabel(allFlavors);
}

function updateFlavorFilterLabel(allFlavors) {
  const el = document.getElementById('flavorFilterLabel');
  if (!el) return;
  const n = allFlavors.filter(f => prodTrendFlavorFilter && prodTrendFlavorFilter.has(f)).length;
  el.textContent = n === 0 ? '없음' : n === allFlavors.length ? '전체 맛' : `${n}개 선택`;
}

function toggleFlavorDropdown(e) {
  e.stopPropagation();
  const panel = document.getElementById('flavorFilterPanel');
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) {
    setTimeout(() => document.addEventListener('click', () => {
      panel.style.display = 'none';
    }, { once: true }), 0);
  }

function selectAllFlavors(e) {
  e.stopPropagation();
  const allFlavors = [...new Set(prodRawData.map(r => getFlavorFromRecord(r)).filter(Boolean))];
  prodTrendFlavorFilter = new Set(allFlavors);
  renderFlavorFilter();
  renderProdTrendChart();
}

function toggleFlavorFilter(flavor, checked) {
  if (!prodTrendFlavorFilter) prodTrendFlavorFilter = new Set();
  if (checked) prodTrendFlavorFilter.add(flavor);
  else prodTrendFlavorFilter.delete(flavor);
  renderFlavorFilter();
  renderProdTrendChart();
}

function setProdTrendPeriod(p) {
  prodTrendPeriod = p;
  document.querySelectorAll('.seg-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.period === p);
  });
  renderProdTrendChart();
}

function openAddProdModal() {
  selOptionId = null; selRecipeId = null;
  document.getElementById('prodBatchInput').value = 1;
  ['ptY','ptM','ptD','ptH'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('prodCostPreview').innerHTML = '';
  document.getElementById('addProdModal').classList.add('show');
  renderProdOptions();
}

function closeAddProdModal() {
  document.getElementById('addProdModal').classList.remove('show');
  selOptionId = null; selRecipeId = null;
}

function renderProdTrendChart() {
  const periodMap = {};

  prodRawData.forEach(r => {
    const d = parseDateOnly(String(r['생산시각']||''));
    if (!d) return;
    const optName = getFlavorFromRecord(r);
    if (!optName) return;
    const label = getPeriodLabel(String(r['생산시각']||''));
    if (!label) return;

    const batches = parseInt(r['배치수']) || 1;

    if (!periodMap[label]) periodMap[label] = {};
    periodMap[label][optName] = (periodMap[label][optName] || 0) + batches;
  });

  const periods = Object.keys(periodMap).sort((a, b) => {
    if (prodTrendPeriod === 'week') {
      const pa = a.match(/(\d+)월(\d+)주/), pb = b.match(/(\d+)월(\d+)주/);
      if (pa && pb) return (parseInt(pa[1])*10+parseInt(pa[2])) - (parseInt(pb[1])*10+parseInt(pb[2]));
    }
    return a.localeCompare(b);
  });

  const allFlavors = [...new Set(prodRawData.map(r => getFlavorFromRecord(r)).filter(Boolean))];
  const flavors    = allFlavors.filter(f => prodTrendFlavorFilter && prodTrendFlavorFilter.has(f));

  const datasets = flavors.map(f => {
    const opt = findOptBySheetName(f);
    return {
      label: f,
      data: periods.map(p => (periodMap[p]&&periodMap[p][f]) || 0),
      backgroundColor: opt ? opt.color : '#5794f2',
      borderWidth: 0,
      stack: 'stack'
    };
  });

  if (chartProdTrend) chartProdTrend.destroy();
  const canvas = document.getElementById('chartProdTrend');
  if (!canvas) return;

  chartProdTrend = new Chart(canvas, {
    type: 'bar',
    data: { labels: periods, datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color:'#0F172A', font:{ size:12, family:"'PretendardVariable','Pretendard',sans-serif" } } },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}배치` } }
      },
      scales: {
        x: { stacked:true, ticks:{ color:'#64748B', font:{ size:12 } }, grid:{ color:'#E2E8F0' } },
        y: { stacked:true, ticks:{ color:'#64748B', font:{ size:12 }, callback: v => v+'배치' }, grid:{ color:'#E2E8F0' } }
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════
// 탭 2: 생산 등록
// ═══════════════════════════════════════════════════════════
function renderProdOptions() {
  const grid = document.getElementById('prodOptionGrid');
  grid.innerHTML = '';
  META.options.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'option-card' + (opt.id === selOptionId ? ' selected' : '');
    div.innerHTML = `<span class="option-dot" style="background:${opt.color}"></span><span class="option-name">${opt.name}</span>`;
    div.onclick = () => selectProdOption(opt.id);
    grid.appendChild(div);
  });
  renderProdStep2();
}

function selectProdOption(id) {
  selOptionId = id;
  selRecipeId = null;
  renderProdOptions();
}

function renderProdStep2() {
  const step2 = document.getElementById('prodStep2');
  const step3 = document.getElementById('prodStep3');
  if (!selOptionId) { step2.style.display = 'none'; step3.style.display = 'none'; return; }

  const recipes = META.recipes.filter(r => r.optionId === selOptionId);
  if (!recipes.length) { step2.style.display = 'none'; step3.style.display = 'none'; return; }

  step2.style.display = 'block';
  const list = document.getElementById('prodRecipeList');
  list.innerHTML = '';
  recipes.forEach(recipe => {
    const cost   = recipeCost(recipe);
    const vol    = batchVolume(recipe);
    const per120 = vol ? Math.round(cost / vol * 120) : 0;
    const div    = document.createElement('div');
    div.className = 'recipe-item' + (recipe.id === selRecipeId ? ' selected' : '');
    div.innerHTML = `
      <div>
        <div>${recipe.name}</div>
        <div class="recipe-meta">배치 용량 ${vol.toLocaleString()}g &nbsp;·&nbsp; 배치원가 ${fmt(cost)} &nbsp;·&nbsp; 120g당 ${per120}원</div>
      </div>
      <span style="color:var(--muted);font-size:18px">›</span>`;
    div.onclick = () => selectProdRecipe(recipe.id);
    list.appendChild(div);
  });
  renderProdStep3();
}

function selectProdRecipe(id) {
  selRecipeId = id;
  renderProdStep2();
}

function renderProdStep3() {
  const step3 = document.getElementById('prodStep3');
  if (!selRecipeId) { step3.style.display = 'none'; return; }
  step3.style.display = 'block';

  const recipe = getRecipe(selRecipeId);
  if (!recipe) return;

  document.getElementById('prodIngPreview').innerHTML =
    recipe.ingredients.map(ri => {
      const ing = getIngr(ri.id);
      return `<span class="ing-tag">${ing ? ing.name : ri.id} ${ri.qty}${ing ? ing.unit : ''}</span>`;
    }).join('');

  // 생산 일시 기본값: 최초 표시 시에만 현재 KST 시각으로 설정
  if (!document.getElementById('ptY').value) {
    setProdTimeInputs(kstNow());
  }

  updateCostPreview();
  document.getElementById('prodBatchInput').oninput = updateCostPreview;
}

function updateCostPreview() {
  const recipe = getRecipe(selRecipeId);
  if (!recipe) return;
  const batches = parseInt(document.getElementById('prodBatchInput').value) || 1;
  const total   = recipeCost(recipe) * batches;
  const totalG  = batchVolume(recipe) * batches;
  document.getElementById('prodCostPreview').innerHTML =
    `총 생산량 <span class="cost-highlight">${totalG.toLocaleString()}g</span> &nbsp;·&nbsp; 예상 원가 <span class="cost-highlight">${fmt(total)}</span>`;
}

async function submitProduction() {
  const recipe  = getRecipe(selRecipeId);
  const opt     = getOpt(selOptionId);
  const batches = parseInt(document.getElementById('prodBatchInput').value) || 1;
  if (!recipe || !opt) return;

  const btn = document.getElementById('prodSubmitBtn');
  btn.disabled = true;
  btn.textContent = '저장 중…';

  const timeISO = getProdTimeStr();

  const params = new URLSearchParams({
    action: 'addProduction',
    time:    timeISO,
    option:  opt.name,
    recipe:  recipe.name,
    batches
  });

  try {
    await fetch(API + '?' + params.toString());
    showToast(`등록 완료: ${opt.name} - ${recipe.name} × ${batches}배치`);
    closeAddProdModal();
    loadProdHistory();
  } catch(e) {
    showToast('저장 실패. 다시 시도해주세요.');
  }

  btn.disabled = false;
  btn.textContent = '생산 등록';
}

const _phTimers = {};

function _phRecipeOpts(optName, selRecipe) {
  const opt = META.options.find(o => o.name === optName);
  const recipes = opt ? META.recipes.filter(r => r.optionId === opt.id) : [];
  return recipes.map(r =>
    `<option value="${r.name}" ${r.name === selRecipe ? 'selected' : ''}>${r.name}</option>`
  ).join('');
}

function _phRow(r) {
  const kst     = parseKST(String(r['생산시각'] || ''));
  const row     = r._row || '';
  const curOpt  = String(r['옵션']    || '');
  const curRec  = String(r['레시피']  || '');
  const ni = (f, v, w, mn, mx) =>
    `<input class="ph-inp" data-field="${f}" type="number" value="${v}"
      min="${mn}" max="${mx}" style="width:${w}" onchange="scheduleProdSave('${row}')">`;

  const optOpts = META.options.map(o =>
    `<option value="${o.name}" ${o.name === curOpt ? 'selected' : ''}>${o.name}</option>`
  ).join('');

  return `
  <tr data-row="${row}">
    <td style="white-space:nowrap">
      <div style="display:flex;align-items:center;gap:2px">
        ${ni('y', kst.y, '46px', 2020, 2099)}
        <span class="ph-sep">/</span>
        ${ni('m', kst.m, '26px', 1, 12)}
        <span class="ph-sep">/</span>
        ${ni('d', kst.d, '26px', 1, 31)}
        <span style="display:inline-block;width:6px"></span>
        ${ni('h', kst.h, '26px', 0, 23)}
        <span class="ph-sep">시</span>
      </div>
    </td>
    <td>
      <select class="ph-inp" data-field="option" style="max-width:90px"
        onchange="onPhOptChange(this,'${row}')">
        ${optOpts}
      </select>
    </td>
    <td>
      <select class="ph-inp" data-field="recipe" id="phRec-${row}" style="max-width:110px"
        onchange="scheduleProdSave('${row}')">
        ${_phRecipeOpts(curOpt, curRec)}
      </select>
    </td>
    <td style="text-align:center">
      ${ni('batches', r['배치수'] || 1, '36px', 1, 99)}
    </td>
    <td>
      <button class="btn btn-danger btn-sm" onclick="deleteProdRow(${row})">✕</button>
    </td>
  </tr>`;
}

async function loadProdHistory() {
  const el = document.getElementById('prodHistory');
  try {
    const res  = await fetch(API + '?action=getProduction');
    const json = await res.json();
    prodRawData = json.data || [];
    renderFlavorFilter();
    renderProdTrendChart();
    let data   = prodRawData.slice();

    // 생산시각 내림차순 정렬
    data.sort((a, b) => String(b['생산시각'] || '').localeCompare(String(a['생산시각'] || '')));
    data = data.slice(0, 30);

    if (!data.length) { el.innerHTML = '<div class="empty">생산 이력이 없습니다.</div>'; return; }

    el.innerHTML = `
      <table>
        <thead><tr>
          <th>생산시각</th>
          <th>맛</th>
          <th>레시피</th>
          <th style="text-align:center">배치</th>
          <th></th>
        </tr></thead>
        <tbody>${data.map(_phRow).join('')}</tbody>
      </table>`;
  } catch(e) {
    el.innerHTML = '<div class="empty">이력 로드 실패</div>';
  }
}

function onPhOptChange(sel, row) {
  const recSel = document.getElementById('phRec-' + row);
  if (recSel) recSel.innerHTML = _phRecipeOpts(sel.value, '');
  scheduleProdSave(row);
}

function scheduleProdSave(row) {
  clearTimeout(_phTimers[row]);
  _phTimers[row] = setTimeout(() => saveProdRow(row), 600);
}

async function saveProdRow(row) {
  const tr  = document.querySelector(`tr[data-row="${row}"]`);
  if (!tr) return;
  const get = f => tr.querySelector(`[data-field="${f}"]`)?.value;
  const y = parseInt(get('y')), m = parseInt(get('m')), d = parseInt(get('d')), h = parseInt(get('h')) || 0;
  if (!y || !m || !d) return;
  try {
    await fetch(API + '?' + new URLSearchParams({
      action:  'updateProduction',
      row,
      time:    buildKstStr(y, m, d, h),
      option:  get('option')  || '',
      recipe:  get('recipe')  || '',
      batches: get('batches') || 1
    }));
    showToast('저장됨');
  } catch(e) { showToast('저장 실패'); }
}

async function deleteProdRow(row) {
  if (!confirm('이 생산 기록을 삭제하시겠습니까?')) return;
  try {
    await fetch(API + '?' + new URLSearchParams({ action: 'deleteProduction', row }));
    showToast('삭제됨');
    loadProdHistory();
  } catch(e) {
    showToast('삭제 실패');
  }
}

// ═══════════════════════════════════════════════════════════
// 탭 3: 레시피 관리
// ═══════════════════════════════════════════════════════════
function renderRecipeTab() {
  renderOptionSidebar();
  renderRecipeEditor();
}

function renderOptionSidebar() {
  const sidebar = document.getElementById('optionSidebar');
  sidebar.innerHTML = '';
  META.options.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'sidebar-item' + (opt.id === editingOptionId ? ' selected' : '');
    div.innerHTML = `
      <span class="option-dot" style="background:${opt.color}"></span>
      <span style="flex:1">${opt.name}</span>
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteOption('${opt.id}')">✕</button>`;
    div.onclick = () => { editingOptionId = opt.id; renderRecipeTab(); };
    sidebar.appendChild(div);
  });
  const addBtn = document.createElement('div');
  addBtn.className = 'sidebar-add';
  addBtn.textContent = '+ 맛 추가';
  addBtn.onclick = addOption;
  sidebar.appendChild(addBtn);
}

function renderRecipeEditor() {
  const wrap = document.getElementById('recipeEditorWrap');
  if (!editingOptionId) {
    wrap.innerHTML = '<div class="empty">좌측에서 맛을 선택하세요.</div>';
    return;
  }
  const opt     = getOpt(editingOptionId);
  const recipes = META.recipes.filter(r => r.optionId === editingOptionId);

  wrap.innerHTML = `
    <div class="section-hdr">
      <h3 style="display:flex;align-items:center;gap:8px">
        <span class="option-dot" style="background:${opt.color}"></span>
        <input value="${opt.name}" style="background:transparent;border:none;color:var(--text);font-size:14px;font-weight:600;width:150px"
          onchange="updateOptionName(this.value)">
        <input type="color" value="${opt.color}" title="색상 변경"
          style="width:28px;height:28px;border:none;border-radius:50%;cursor:pointer;background:none;padding:0"
          onchange="updateOptionColor(this.value)">
      </h3>
      <button class="btn btn-ghost btn-sm" onclick="addRecipe('${editingOptionId}')">+ 레시피 추가</button>
    </div>
    <div class="recipe-editor" id="recipeEditor">
      ${recipes.map(r => renderRecipeCard(r)).join('')}
      ${recipes.length === 0 ? '<div class="empty">레시피가 없습니다.</div>' : ''}
    </div>`;
}

function renderRecipeCard(recipe) {
  const cost   = recipeCost(recipe);
  const vol    = batchVolume(recipe);
  const per120 = vol ? Math.round(cost / vol * 120) : 0;

  const ingOptions = META.ingredients.map(ing =>
    `<option value="${ing.id}">${ing.name} (${ing.unit})</option>`
  ).join('');

  const ingRows = recipe.ingredients.map((ri, idx) => {
    const selOptions = META.ingredients.map(ing =>
      `<option value="${ing.id}" ${ing.id === ri.id ? 'selected' : ''}>${ing.name} (${ing.unit})</option>`
    ).join('');
    return `
      <div class="ing-row">
        <select class="ing-select" onchange="updateIngredient('${recipe.id}',${idx},'id',this.value)">${selOptions}</select>
        <input class="ing-qty" type="number" value="${ri.qty}" min="0" step="any"
          onchange="updateIngredient('${recipe.id}',${idx},'qty',this.value)">
        <span style="color:var(--muted);font-size:12px">${getIngr(ri.id)?.unit || ''}</span>
        <button class="btn btn-ghost btn-sm" onclick="removeIngredient('${recipe.id}',${idx})">✕</button>
      </div>`;
  }).join('');

  return `
    <div class="recipe-row" id="rcard-${recipe.id}">
      <div class="recipe-header">
        <div>
          <input class="recipe-name-input" value="${recipe.name}"
            onchange="updateRecipeName('${recipe.id}',this.value)">
          <div style="font-size:11px;color:var(--muted);margin-top:4px">
            배치 용량: <span id="rvol-${recipe.id}">${vol.toLocaleString()}</span>g
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="openCopyModal('${recipe.id}')">복사</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRecipe('${recipe.id}')">삭제</button>
        </div>
      </div>
      ${ingRows}
      <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="addIngredientToRecipe('${recipe.id}')">+ 재료 추가</button>
      <div class="recipe-cost" id="rcost-${recipe.id}">
        배치 원가: <strong style="color:var(--green)">${fmt(cost)}</strong>
        &nbsp;·&nbsp; 120g당: <strong style="color:var(--accent)">${per120}원</strong>
        <span style="color:var(--muted);margin-left:4px">(재료비 × 1.1 손실 포함)</span>
      </div>
    </div>`;
}

function updateOptionName(val) {
  const opt = getOpt(editingOptionId);
  if (opt) { opt.name = val; persistMeta(); renderOptionSidebar(); }
}
function updateOptionColor(val) {
  const opt = getOpt(editingOptionId);
  if (opt) { opt.color = val; persistMeta(); renderOptionSidebar(); }
}
function addOption() {
  const name = prompt('새 맛 이름:');
  if (!name) return;
  const o = { id: 'o' + uid(), name, color: '#5794f2' };
  META.options.push(o);
  editingOptionId = o.id;
  persistMeta(); renderRecipeTab();
}
function deleteOption(id) {
  if (!confirm('이 맛과 연결된 레시피도 모두 삭제됩니다. 계속하시겠습니까?')) return;
  META.options = META.options.filter(o => o.id !== id);
  META.recipes = META.recipes.filter(r => r.optionId !== id);
  if (editingOptionId === id) editingOptionId = META.options[0]?.id || null;
  persistMeta(); renderRecipeTab();
}
function addRecipe(optionId) {
  const r = { id: 'r' + uid(), optionId, name: '새 레시피', ingredients: [] };
  META.recipes.push(r);
  persistMeta(); renderRecipeEditor();
}
function deleteRecipe(id) {
  if (!confirm('레시피를 삭제하시겠습니까?')) return;
  META.recipes = META.recipes.filter(r => r.id !== id);
  persistMeta(); renderRecipeEditor();
}

let copyingRecipeId = null;
function openCopyModal(recipeId) {
  copyingRecipeId = recipeId;
  const sel = document.getElementById('copyTargetSelect');
  sel.innerHTML = META.options.map(o =>
    `<option value="${o.id}">${o.name}</option>`
  ).join('');
  // 기본 선택: 현재 맛 이외 첫 번째, 없으면 현재 맛
  const src = getRecipe(recipeId);
  const other = META.options.find(o => o.id !== (src && src.optionId));
  if (other) sel.value = other.id;
  document.getElementById('copyModal').classList.add('show');
}
function closeCopyModal() {
  document.getElementById('copyModal').classList.remove('show');
  copyingRecipeId = null;
}
function confirmCopy() {
  const src = getRecipe(copyingRecipeId);
  if (!src) { closeCopyModal(); return; }
  const targetId = document.getElementById('copyTargetSelect').value;
  const target   = META.options.find(o => o.id === targetId);
  if (!target) { closeCopyModal(); return; }

  const newRecipe = {
    id: 'r' + uid(),
    optionId: targetId,
    name: src.name + ' (복사본)',
    ingredients: JSON.parse(JSON.stringify(src.ingredients))
  };
  META.recipes.push(newRecipe);
  persistMeta();
  closeCopyModal();

  // 복사 대상 맛으로 이동
  editingOptionId = targetId;
  renderRecipeTab();
  showToast(`"${src.name}"을 ${target.name}으로 복사했습니다.`);
}
function updateRecipeName(id, val) {
  const r = getRecipe(id);
  if (r) { r.name = val; persistMeta(); refreshRecipeCost(id); }
}
function updateIngredient(recipeId, idx, field, val) {
  const r = getRecipe(recipeId);
  if (!r) return;
  if (field === 'qty') r.ingredients[idx].qty = parseFloat(val) || 0;
  if (field === 'id')  r.ingredients[idx].id  = val;
  persistMeta(); refreshRecipeCost(recipeId);
}
function addIngredientToRecipe(recipeId) {
  const r   = getRecipe(recipeId);
  const ing = META.ingredients[0];
  if (!r || !ing) return;
  r.ingredients.push({ id: ing.id, qty: 0 });
  persistMeta(); renderRecipeEditor();
}
function removeIngredient(recipeId, idx) {
  const r = getRecipe(recipeId);
  if (!r) return;
  r.ingredients.splice(idx, 1);
  persistMeta(); renderRecipeEditor();
}
function refreshRecipeCost(recipeId) {
  const r    = getRecipe(recipeId);
  if (!r) return;
  const cost   = recipeCost(r);
  const vol    = batchVolume(r);
  const per120 = vol ? Math.round(cost / vol * 120) : 0;
  const el     = document.getElementById('rcost-' + recipeId);
  if (el) el.innerHTML =
    `배치 원가: <strong style="color:var(--green)">${fmt(cost)}</strong> &nbsp;·&nbsp; 120g당: <strong style="color:var(--accent)">${per120}원</strong> <span style="color:var(--muted)">(재료비 × 1.1 손실 포함)</span>`;
  const velEl  = document.getElementById('rvol-' + recipeId);
  if (velEl) velEl.textContent = vol.toLocaleString();
}

// ═══════════════════════════════════════════════════════════
// 탭 4: 재료 관리
// ═══════════════════════════════════════════════════════════
function renderIngrTable() {
  document.getElementById('ingrTableBody').innerHTML =
    META.ingredients.map((ing, idx) => {
      const url = ing.url || '';
      const linkIcon = url
        ? `<a href="${url}" target="_blank" rel="noopener" class="url-link" title="${url}">🔗 링크</a>`
        : '';
      return `
        <tr>
          <td><input class="cell-input" value="${ing.name}"
            onchange="META.ingredients[${idx}].name=this.value;persistMeta()"></td>
          <td><input class="cell-input" value="${ing.unit}" style="width:60px"
            onchange="META.ingredients[${idx}].unit=this.value;persistMeta()"></td>
          <td><input class="cell-input" type="number" value="${ing.price}" step="any" min="0" style="width:120px"
                onchange="META.ingredients[${idx}].price=parseFloat(this.value)||0;persistMeta()"></td>
          <td style="min-width:220px">
            <div style="display:flex;align-items:center;gap:6px">
              <input class="cell-input" type="url" value="${url}" placeholder="https://…"
                onchange="META.ingredients[${idx}].url=this.value;persistMeta();renderIngrTable()"
                style="flex:1;font-size:12px">
              ${linkIcon}
            </div>
          </td>
          <td><button class="btn btn-ghost btn-sm" onclick="deleteIngredient(${idx})">✕</button></td>
        </tr>`;
    }).join('');
}

function addIngredient() {
  META.ingredients.push({ id: 'i' + uid(), name: '새 재료', unit: 'g', price: 0, url: '' });
  persistMeta();
  renderIngrTable();
}
function deleteIngredient(idx) {
  if (!confirm(`"${META.ingredients[idx].name}" 재료를 삭제할까요?`)) return;
  const id = META.ingredients[idx].id;
  META.ingredients.splice(idx, 1);
  META.recipes.forEach(r => { r.ingredients = r.ingredients.filter(ri => ri.id !== id); });
  persistMeta();
  renderIngrTable();
}

// ═══════════════════════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════════════════════
async function init() {
  // 초기 탭: URL 해시 우선, 없으면 생산 관리
  const initHash = location.hash.slice(1);
  const startTab = TAB_IDX.hasOwnProperty(initHash) ? initHash : 'prod';
  switchTab(startTab);

  // API에서 최신 메타 로드 후 재렌더
  const updated = await loadMetaFromAPI();
  if (updated) {
    renderProdOptions();
    if (document.getElementById('tab-recipe').classList.contains('active')) renderRecipeTab();
    if (document.getElementById('tab-ingr').classList.contains('active'))   renderIngrTable();
  }
}

init();
</script>
</body>
</html>
